<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة أسعار التوصيل اليدوية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <h2 class="text-center mb-4">ادخلي الأسعار يدوياً</h2>
    
    <div class="card shadow-sm p-4">
        <table class="table">
            <thead>
                <tr>
                    <th>اسم الولاية</th>
                    <th>سعر المكتب</th>
                    <th>سعر المنزل</th>
                </tr>
            </thead>
            <tbody id="manual-table">
                </tbody>
        </table>
        <button class="btn btn-primary" onclick="printPrices()">طباعة أو حفظ الصفحة</button>
    </div>
</div>

<script>
    // إنشاء 58 خانة للولايات (تلقائياً)
    const tbody = document.getElementById('manual-table');
    for (let i = 1; i <= 58; i++) {
        tbody.innerHTML += `
        <tr>
            <td><input type="text" class="form-control" placeholder="الولاية ${i}"></td>
            <td><input type="number" class="form-control" placeholder="0"></td>
            <td><input type="number" class="form-control" placeholder="0"></td>
        </tr>`;
    }

    function printPrices() {
        window.print(); // سيفتح لكِ نافذة الطباعة لحفظ الصفحة كـ PDF أو طباعتها
    }
</script>
</body>
</html>
