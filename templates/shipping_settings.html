<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة أسعار التوصيل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">تعديل أسعار التوصيل لجميع الولايات</h2>
    
    <div class="card shadow-sm p-4">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>الولاية</th>
                    <th>للمكتب (DA)</th>
                    <th>للمنزل (DA)</th>
                    <th>حفظ</th>
                </tr>
            </thead>
            <tbody id="delivery-table">
                <!-- سيتم تحميل البيانات من قاعدة البيانات هنا -->
            </tbody>
        </table>
        
        <div class="mt-3 text-center">
            <button class="btn btn-secondary" onclick="window.print()">طباعة أو حفظ كـ PDF</button>
        </div>
    </div>
</div>

<script>
// وظيفة جلب البيانات من السيرفر
async function loadPrices() {
    try {
        const res = await fetch('/get_delivery_prices');
        const data = await res.json();
        const tbody = document.getElementById('delivery-table');
        tbody.innerHTML = '';
        
        data.forEach(item => {
            tbody.innerHTML += `
            <tr>
                <td>${item.wilaya_name}</td>
                <td><input type="number" id="office-${item.id}" value="${item.office_price || 0}" class="form-control"></td>
                <td><input type="number" id="home-${item.id}" value="${item.home_price || 0}" class="form-control"></td>
                <td><button class="btn btn-primary btn-sm" onclick="savePrice(${item.id})">حفظ</button></td>
            </tr>`;
        });
    } catch (e) {
        console.error("خطأ في جلب البيانات:", e);
    }
}

// وظيفة حفظ السعر للسيرفر
async function savePrice(id) {
    const office = document.getElementById(`office-${id}`).value;
    const home = document.getElementById(`home-${id}`).value;
    
    try {
        const res = await fetch('/update_delivery_price', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id, office_price: office, home_price: home})
        });
        
        if (res.ok) {
            alert('تم حفظ السعر للولاية بنجاح!');
        } else {
            alert('حدث خطأ أثناء الحفظ.');
        }
    } catch (e) {
        alert('فشل الاتصال بالسيرفر.');
    }
}

// تشغيل الدالة عند تحميل الصفحة
window.onload = loadPrices;
</script>

</body>
</html>
