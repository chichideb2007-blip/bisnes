<div class="container mt-4" style="max-width: 900px;">
    <h2 class="mb-4">إدارة أسعار توصيل الولايات</h2>
    
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover table-bordered align-middle">
                <thead class="table-success">
                    <tr>
                        <th>الولاية</th>
                        <th>سعر المكتب (دج)</th>
                        <th>سعر المنزل (دج)</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody>
                    {% for rate in rates %}
                    <tr>
                        <form action="{{ url_for('shipping_settings') }}" method="POST">
                            <td>
                                {{ rate.wilaya_name if rate.wilaya_name else "ولاية رقم " ~ rate.id }}
                                <input type="hidden" name="id" value="{{ rate.id }}">
                            </td>
                            <td>
                                <input type="number" name="office_price" value="{{ rate.office_price }}" class="form-control form-control-sm">
                            </td>
                            <td>
                                <input type="number" name="home_price" value="{{ rate.home_price }}" class="form-control form-control-sm">
                            </td>
                            <td>
                                <button type="submit" class="btn btn-sm btn-success">حفظ</button>
                            </td>
                        </form>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
