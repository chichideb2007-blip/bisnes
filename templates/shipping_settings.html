<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة أسعار التوصيل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table thead { background-color: #198754; color: white; }
    </style>
</head>
<body>

<div class="container mt-4" style="max-width: 900px;">
    <h2 class="mb-4 text-center">إدارة أسعار توصيل الولايات</h2>
    <div class="d-flex justify-content-between mb-3">
        <a href="/dashboard" class="btn btn-secondary">⬅️ الرجوع للوحة التحكم</a>
    </div>
    
    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle text-center">
                    <thead>
                        <tr>
                            <th>الولاية</th>
                            <th>سعر التوصيل للمكتب (دج)</th>
                            <th>سعر التوصيل للمنزل (دج)</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="delivery-table">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // دالة جلب البيانات من السيرفر
    async function loadPrices() {
        try {
            const res = await fetch('/get_delivery_prices');
            const data = await res.json();
            
            // السطر الذي طلبته للفحص
            console.log("البيانات المستلمة من السيرفر:", data); 
            
            const tbody = document.getElementById('delivery-table');
            
            tbody.innerHTML = '';
            data.forEach(row => {
                const name = row.wilaya_name || row.state_name; 
                
                tbody.innerHTML += `
                <tr>
                    <td>${name}</td>
                    <td>
                        <input type="number" id="office-${row.id}" value="${row.office_price}" class="form-control form-control-sm">
                    </td>
                    <td>
                        <input type="number" id="home-${row.id}" value="${row.home_price}" class="form-control form-control-sm">
                    </td>
                    <td>
                        <button class="btn btn-sm btn-success" onclick="savePrice(${row.id})">حفظ</button>
                    </td>
                </tr>`;
            });
        } catch (error) {
            console.error("خطأ في تحميل البيانات:", error);
        }
    }

    // دالة حفظ السعر عند الضغط على الزر
    async function savePrice(id) {
        const office = document.getElementById(`office-${id}`).value;
        const home = document.getElementById(`home-${id}`).value;
        
        const res = await fetch('/update_delivery_price', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id, office_price: office, home_price: home})
        });
        
        if(res.ok) {
            alert('تم حفظ السعر بنجاح!');
        } else {
            alert('حدث خطأ أثناء الحفظ');
        }
    }

    // تشغيل الدالة عند تحميل الصفحة
    loadPrices();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
