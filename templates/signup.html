<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <!-- استدعاء Bootstrap لشريط الأدوات فقط -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- شريط الأدوات العلوي الموحد -->
    <div class="container mt-3">
        <div class="d-flex justify-content-between align-items-center">
            <a href="{{ url_for('login') }}" class="btn btn-secondary">⬅️ تسجيل الدخول</a>
            
            <!-- المحرك الذي يجعل الصفحة قابلة للترجمة التلقائية -->
            <div id="google_translate_element"></div>
            
            <a href="{{ url_for('signup') }}" class="btn btn-primary">➕ إنشاء حساب</a>
        </div>
    </div>

    <!-- سكربت تهيئة الترجمة -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ar',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>

    <!-- محتوى الصفحة -->
    <div class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">إنشاء حساب جديد</h2>
            
            <form action="/signup" method="POST">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-1">كود الشركة (يجب أن يكون فريداً)</label>
                    <input type="text" name="company_code" placeholder="مثال: company123" required 
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 mb-1">اسم الشركة/المتجر</label>
                    <input type="text" name="company_name" placeholder="أدخل اسم متجرك" required 
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                
                <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-bold text-lg">
                    إنشاء الحساب
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    لديك حساب بالفعل؟ 
                    <a href="/login" class="text-blue-600 font-bold hover:underline">سجل دخولك الآن</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
