<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - {{ settings.shop_name }}</title>
    <style>
        /* نظام المتغيرات اللونية - يمنع تداخل الألوان */
        :root {
            --primary-color: {{ settings.primary_color|default('#7e22ce') }};
            --glass-bg: rgba(255, 255, 255, 0.2);
            --text-color: #333;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); 
            min-height: 100vh; margin: 0; padding: 20px; 
        }

        /* حاوية الأزرار الاحترافية */
        .nav-bar { 
            display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; 
            flex-wrap: wrap;
        }
        .nav-bar a { 
            text-decoration: none; color: white; 
            background: var(--primary-color); padding: 12px 25px; 
            border-radius: 12px; font-weight: bold; transition: 0.3s;
        }
        .nav-bar a:hover { opacity: 0.9; transform: translateY(-2px); }

        /* البطاقات الزجاجية */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: auto;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h1 { color: var(--primary-color); text-align: center; margin-bottom: 30px; }
        .value { font-size: 32px; font-weight: bold; color: var(--text-color); margin-top: 15px; }
        h3 { margin: 0; color: #555; }
    </style>
</head>
<body>

<h1>لوحة تحكم {{ settings.shop_name }}</h1>

<div class="nav-bar">
    <a href="{{ url_for('orders') }}">الطلبيات</a>
    <a href="{{ url_for('stats') }}">الإحصائيات</a>
    <a href="{{ url_for('settings') }}">الإعدادات</a>
    <a href="{{ url_for('logout') }}">خروج</a>
</div>

<div class="dashboard-grid">
    <div class="glass-card">
        <h3>مجموع المصروف اليومي</h3>
        <div class="value">{{ total_sales }} دج</div>
    </div>
    
    <div class="glass-card">
        <h3>عدد الطلبات المسجلة</h3>
        <div class="value">{{ order_count }} طلب</div>
    </div>
    
    <div class="glass-card">
        <h3>الحالة</h3>
        <div class="value" style="font-size: 20px;">نظام مفعل</div>
    </div>
</div>

</body>
</html>
