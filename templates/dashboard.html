<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <style>
        :root {
            --primary: {{ settings.primary_color }};
            --secondary: {{ settings.secondary_color }};
        }
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 10px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>{{ settings.shop_name }}</h1></div>
    
    <div class="card">
        <h3>⚙️ الإعدادات</h3>
        <form action="/update-info" method="POST">
            <input type="text" name="shop_name" value="{{ settings.shop_name }}" placeholder="اسم المتجر">
            <input type="text" name="bot_token" value="{{ settings.telegram_bot_token }}" placeholder="Token">
            <input type="text" name="chat_id" value="{{ settings.telegram_chat_id }}" placeholder="Chat ID">
            <button type="submit">حفظ المعلومات</button>
        </form>
        <form action="/update-colors" method="POST">
            <input type="color" name="primary_color" value="{{ settings.primary_color }}">
            <input type="color" name="secondary_color" value="{{ settings.secondary_color }}">
            <button type="submit" style="background: var(--secondary);">حفظ الألوان</button>
        </form>
    </div>

    <div class="card">
        <h3>📦 الطلبات</h3>
        {% for o in orders %}
        <div style="border-right: 5px solid var(--primary); padding: 10px; background: #eee; margin-bottom: 10px;">
            <p>{{ o.customer_name }} - {{ o.product_name }} ({{ o.total_price }} دج)</p>
            <form action="/delete-order" method="POST"><input type="hidden" name="order_id" value="{{ o.id }}"><button style="background: red;">حذف</button></form>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
