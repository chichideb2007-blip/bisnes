<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <style>
        body { font-family: sans-serif; background: #f9fafb; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; }
        .tabs button.active { background: #7e22ce; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #7e22ce; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="active" onclick="showTab('stats', this)">الإحصائيات</button>
    <button onclick="showTab('settings', this)">الإعدادات</button>
    <button onclick="showTab('orders', this)">الطلبات</button>
</div>

<div id="stats" class="tab-content active">
    <h3>📊 الإحصائيات</h3>
    <p>مبيعات اليوم: 0 دج</p>
    <p>مبيعات الشهر الحالي: 0 دج</p>
    <p>مبيعات السنة: 0 دج</p>
</div>

<div id="settings" class="tab-content">
    <h3>⚙️ الإعدادات</h3>
    <input type="text" placeholder="اسم المتجر">
    <button class="btn">حفظ</button>
</div>

<div id="orders" class="tab-content">
    <h3>📦 إضافة طلب جديد</h3>
    <input type="text" placeholder="الاسم">
    <input type="text" placeholder="السعر">
    <button class="btn">حفظ</button>
</div>

<script>
    function showTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
