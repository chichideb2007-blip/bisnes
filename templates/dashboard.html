<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>أهلاً {{ user }}</h1>
        <h2>مجموع الأرباح: {{ total }} دج</h2>
    </div>

    <div class="box">
        <h3>إضافة طلب جديد</h3>
        <form action="/add-order" method="POST">
            <input name="name" placeholder="اسم الزبون" required>
            <input name="details" placeholder="التفاصيل">
            <input name="price" type="number" placeholder="السعر" required>
            <button type="submit">حفظ الطلب</button>
        </form>
    </div>

    <div class="box">
        <h3>الطلبات</h3>
        <ul>
            {% for o in orders %}
            <li>{{ o.customer_name }} | {{ o.price }} دج</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
