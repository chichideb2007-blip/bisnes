<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: {{ settings.primary_color if settings and settings.primary_color else '#7e22ce' }}; --secondary: #a855f7; }
        body { font-family: sans-serif; background: #f9fafb; margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; }
        .tabs button.active { background: var(--primary); color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="active" onclick="showTab(event, 'stats')">الإحصائيات</button>
    <button onclick="showTab(event, 'settings')">الإعدادات</button>
    <button onclick="showTab(event, 'orders')">الطلبيات</button>
</div>

<div id="stats" class="tab-content active">
    <h3>مجموع المصروف اليومي: 0.0 دج</h3>
    <canvas id="chartDays"></canvas>
    <canvas id="chartMonths"></canvas>
    <canvas id="chartYears"></canvas>
    <button class="btn" style="background:red;" onclick="window.location.href='/logout'">تسجيل الخروج</button>
</div>

<div id="settings" class="tab-content">
    <input type="text" placeholder="اسم المتجر الحالي">
    <input type="text" placeholder="معرف بوت تلجرام (Bot Token)">
    <input type="text" placeholder="معرف شات تلجرام (Chat ID)">
    <button class="btn" style="background:var(--primary);">حفظ معلومات المتجر</button>
    <hr>
    <label>تخصيص اللون الأساسي:</label><input type="color" name="primary">
    <label>تخصيص اللون الثانوي:</label><input type="color" name="secondary">
    <button class="btn" style="background:var(--primary);">حفظ وتطبيق الألوان</button>
</div>

<div id="orders" class="tab-content">
    <input type="text" placeholder="اسم الزبون الكامل">
    <input type="text" placeholder="المنتج أو السلعة المطلوبة">
    <input type="number" placeholder="السعر الفعلي للطلبية (دج)">
    <input type="text" placeholder="رقم هاتف الزبون">
    <button class="btn" style="background:green;">حفظ الطلبية وتأكيدها</button>
    <hr>
    <p>جدول الطلبيات المسجلة...</p>
</div>

<script>
    function showTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }
    // هنا سيتم ربط الرسوم البيانية بالبيانات الحقيقية لاحقاً
</script>
</body>
</html>
