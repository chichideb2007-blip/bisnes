<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: {{ settings.primary_color }}; --secondary: {{ settings.secondary_color }}; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-btn { background: #333; color: white; padding: 10px; border-radius: 6px; text-decoration: none; margin-left: 10px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="section" style="display:flex; justify-content:space-between;">
        <div>
            <a href="/" class="nav-btn">لوحة التحكم</a>
            <a href="/" class="nav-btn">الرئيسية</a>
        </div>
        <a href="/logout" style="color:red; text-decoration:none;">خروج 🚪</a>
    </div>

    <div class="section">
        <h3>📊 إحصائيات الطلبات</h3>
        <div style="display: flex; gap: 20px;">
            <div style="width: 60%;">
                <canvas id="myChart"></canvas>
            </div>
            <div style="width: 40%; align-self: center;">
                <p>مجموع المبيعات اليومي: <strong>{{ orders|sum(attribute='total_price') }} دج</strong></p>
            </div>
        </div>
    </div>

    <div class="section">
        <h3 onclick="document.getElementById('set').style.display=(document.getElementById('set').style.display=='block'?'none':'block');" style="cursor:pointer;">⚙️ إعدادات المتجر (اضغط للفتح)</h3>
        <div id="set" style="display:none;">
             </div>
    </div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء'],
                datasets: [{
                    label: 'المبيعات (دج)',
                    data: [1000, 2500, 1800, 3200, 4500],
                    borderColor: '{{ settings.primary_color }}',
                    tension: 0.1
                }]
            }
        });
    </script>
</body>
</html>
