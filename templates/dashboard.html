<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: {{ settings.primary_color }}; --secondary: {{ settings.secondary_color }}; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; padding: 20px; }
        
        /* تصميم السطر الواحد */
        .top-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .flex-item { flex: 1; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .header-bar { cursor: pointer; background: #f1f1f1; padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .content-area { display: none; padding-top: 15px; }
        
        /* تصميم الجدول الاحترافي */
        .table-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: var(--primary); color: white; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #fcfcfc; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin-top: 5px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

<div class="top-row">
    <!-- خانة الإحصائيات -->
    <div class="flex-item">
        <div class="header-bar" onclick="document.getElementById('stats-content').style.display = (document.getElementById('stats-content').style.display === 'block') ? 'none' : 'block';">📊 الإحصائيات</div>
        <div id="stats-content" class="content-area">
            <canvas id="myChart"></canvas>
            <p>المصروف اليومي: <strong>{{ orders|sum(attribute='total_price') }} دج</strong></p>
            <a href="/logout" class="btn" style="background:#dc3545;">خروج</a>
        </div>
    </div>

    <!-- خانة الإعدادات -->
    <div class="flex-item">
        <div class="header-bar" onclick="document.getElementById('settings-content').style.display = (document.getElementById('settings-content').style.display === 'block') ? 'none' : 'block';">⚙️ الإعدادات</div>
        <div id="settings-content" class="content-area">
            <form action="/update-info" method="POST">
                <input name="shop_name" placeholder="اسم المتجر" value="{{ settings.shop_name }}">
                <button class="btn" style="background:var(--primary);">حفظ</button>
            </form>
        </div>
    </div>
</div>

<!-- جدول الطلبات الاحترافي -->
<div class="table-container">
    <h3>📦 قائمة الطلبات</h3>
    <table>
        <tr><th>الزبون</th><th>المنتج</th><th>السعر</th><th>الإجراء</th></tr>
        {% for o in orders %}
        <tr>
            <td>{{ o.customer_name }}</td>
            <td>{{ o.product_name }}</td>
            <td>{{ o.total_price }} دج</td>
            <td>
                <form action="/delete-order" method="POST">
                    <input type="hidden" name="order_id" value="{{ o.id }}">
                    <button type="submit" style="background:none; border:none; color:red; cursor:pointer;">🗑️ حذف</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<script>
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, { type: 'line', data: { labels: ['السبت', 'الأحد', 'الاثنين'], datasets: [{ label: 'المبيعات', data: [1000, 2000, 1500], borderColor: '{{ settings.primary_color }}' }] } });
</script>
</body>
</html>
