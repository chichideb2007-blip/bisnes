<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><style>body{font-family:sans-serif; padding:20px;}</style></head>
<body>
    <h1>أهلاً {{ user }}</h1>
    <h3>إضافة طلب جديد</h3>
    <form action="/add-order" method="POST">
        <input name="name" placeholder="اسم الزبون" required>
        <input name="product" placeholder="اسم المنتج" required>
        <input name="price" type="number" placeholder="السعر" required>
        <input name="phone" placeholder="رقم الهاتف">
        <button type="submit">حفظ الطلب</button>
    </form>
    <h3>قائمة الطلبات</h3>
    <ul>
        {% for o in orders %}
        <li>{{ o.customer_name }} | {{ o.product_name }} | {{ o.total_price }} دج</li>
        {% endfor %}
    </ul>
</body>
</html>
