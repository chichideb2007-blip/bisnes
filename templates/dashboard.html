
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <style>
        :root { --primary-color: {{ settings.primary_color|default('#7e22ce') }}; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; margin: 0; padding: 20px; 
        }

        /* تأثير الزجاج */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            text-align: center;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        h1 { color: var(--primary-color); text-align: center; }

        .nav-links { text-align: center; margin-bottom: 30px; }
        .nav-links a { 
            margin: 0 15px; text-decoration: none; color: var(--primary-color); 
            font-weight: bold; background: white; padding: 10px 20px; border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>مرحباً بك في {{ settings.shop_name }}</h1>

<div class="nav-links">
    <a href="/orders">الطلبيات</a>
    <a href="/stats">الإحصائيات</a>
    <a href="/settings">الإعدادات</a>
    <a href="/logout">خروج</a>
</div>

<div class="dashboard-grid">
    <div class="glass-card">
        <h3>المبيعات اليومية</h3>
        <p style="font-size: 24px; font-weight: bold;">-- دج</p>
    </div>
    <div class="glass-card">
        <h3>الطلبات الجارية</h3>
        <p style="font-size: 24px; font-weight: bold;">-- طلب</p>
    </div>
    <div class="glass-card">
        <h3>مجموع الأرباح</h3>
        <p style="font-size: 24px; font-weight: bold;">-- دج</p>
    </div>
</div>

</body>
</html>
