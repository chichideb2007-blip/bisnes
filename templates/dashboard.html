<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --primary: {{ settings.primary_color }}; --secondary: {{ settings.secondary_color }}; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header-click { cursor: pointer; background: #eee; padding: 15px; border-radius: 10px; font-weight: bold; }
        .content-hidden { display: none; margin-top: 15px; }
        .btn { padding: 10px; width: 100%; border: none; border-radius: 6px; cursor: pointer; color: white; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <div class="header-click" onclick="document.getElementById('stats').classList.toggle('content-hidden')">📊 الإحصائيات (اضغط للفتح)</div>
    <div id="stats" class="content-hidden">
        <p>مبيعات اليوم: <strong>{{ daily_total }} دج</strong></p>
        <p>مبيعات الشهر الحالي: <strong>{{ monthly_total }} دج</strong></p>
        <p>مبيعات السنة: <strong>{{ yearly_total }} دج</strong></p>
    </div>
</div>

<div class="box">
    <div class="header-click" onclick="document.getElementById('settings').classList.toggle('content-hidden')">⚙️ الإعدادات (اضغط للفتح)</div>
    <div id="settings" class="content-hidden">
        <form action="/update-info" method="POST">
            <input name="shop_name" value="{{ settings.shop_name }}" placeholder="اسم المتجر">
            <input name="bot_token" value="{{ settings.telegram_bot_token }}" placeholder="Bot Token">
            <input name="chat_id" value="{{ settings.telegram_chat_id }}" placeholder="Chat ID">
            <button class="btn" style="background:var(--primary);">حفظ</button>
        </form>
    </div>
</div>

<div class="box">
    <h3>📦 إضافة طلب جديد</h3>
    <form action="/add-order" method="POST">
        <input name="name" placeholder="الاسم" required>
        <input name="price" type="number" placeholder="السعر" required>
        <button class="btn" style="background:var(--primary);">حفظ</button>
    </form>
</div>

</body>
</html>
