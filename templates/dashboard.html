<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>لوحة التحكم</title>
    <style>
        body { background-color: #f8f9fa; }
        .dashboard-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 40px; }
        .nav-btn { min-width: 130px; padding: 12px; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- شريط الأدوات العلوي الموحد -->
    <div class="container mt-3">
        <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-5">🏠 الرئيسية</span>
            
            <!-- استدعاء ملف الترجمة الموحد -->
            {% include 'translate.html' %}
            
            <a href="{{ url_for('logout') }}" class="btn btn-danger">🚪 خروج</a>
        </div>
    </div>

    <!-- محتوى لوحة التحكم -->
    <div class="container">
        <div class="dashboard-card text-center">
            <h2 class="fw-bold mb-4">مرحباً بك في لوحة التحكم</h2>
            <p class="text-muted mb-4">اختر القسم الذي تريد الانتقال إليه:</p>
            
            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a href="{{ url_for('orders') }}" class="btn btn-primary nav-btn">📦 الطلبات</a>
                <a href="{{ url_for('stats') }}" class="btn btn-success nav-btn">📊 الإحصائيات</a>
                <a href="{{ url_for('products') }}" class="btn btn-info text-white nav-btn">🛒 المخزون</a>
                <a href="{{ url_for('settings') }}" class="btn btn-warning text-white nav-btn">⚙️ الإعدادات</a>
            </div>
        </div>
    </div>

</body>
</html>
