<!-- أزرار التبديل -->
<div class="tabs">
    <button onclick="showTab('stats')">الإحصائيات</button>
    <button onclick="showTab('settings')">الإعدادات</button>
    <button onclick="showTab('orders')">الطلبات</button>
</div>

<!-- محتوى الإحصائيات -->
<div id="stats" class="tab-content">
    <h2>الإحصائيات والمصروفات</h2>
    <div class="stat-card">مجموع المصروف اليومي: 0.0 دج</div>
    <canvas id="chartDays"></canvas>
    <canvas id="chartMonths"></canvas>
    <canvas id="chartYears"></canvas>
</div>

<!-- محتوى الإعدادات -->
<div id="settings" class="tab-content" style="display:none;">
    <h2>إعدادات المتجر وتخصيص الألوان</h2>
    <!-- هنا ستكون مدخلات الألوان التي ستغير قيمة --primary و --secondary -->
</div>

<script>
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.getElementById(tabId).style.display = 'block';
}
</script>
