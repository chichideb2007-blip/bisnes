<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-color: #7e22ce; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        
        /* التبويبات */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; background: #ddd; font-weight: bold; }
        .tabs button.active { background: var(--main-color); color: white; }
        
        /* الصفحات */
        .page { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .page.active { display: block; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--main-color); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="active" onclick="switchPage('stats', this)">الإحصائيات</button>
    <button onclick="switchPage('settings', this)">الإعدادات</button>
    <button onclick="switchPage('orders', this)">الطلبيات</button>
</div>

<div id="stats" class="page active">
    <h3>📊 الإحصائيات (2026)</h3>
    <canvas id="chartDays"></canvas>
    <button class="btn" style="background:red;" onclick="window.location.href='/logout'">تسجيل الخروج</button>
</div>

<div id="settings" class="page">
    <h3>⚙️ إعدادات المتجر</h3>
    <input type="text" placeholder="اسم المتجر">
    <input type="color" id="colorPicker" onchange="previewColor()">
    <button class="btn" onclick="saveSettings()">حفظ الألوان</button>
</div>

<div id="orders" class="page">
    <h3>📦 إدارة الطلبيات</h3>
    <input type="text" id="cName" placeholder="اسم الزبون">
    <input type="text" id="prod" placeholder="المنتج">
    <input type="number" id="price" placeholder="السعر">
    <button class="btn" style="background:green;" onclick="addOrder()">حفظ الطلبية</button>
    <table>
        <thead><tr><th>الزبون</th><th>المنتج</th><th>السعر</th><th>تحكم</th></tr></thead>
        <tbody id="orderBody"></tbody>
    </table>
</div>

<script>
    // التبديل بين الصفحات
    function switchPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
    }

    // إدارة الطلبيات
    function addOrder() {
        let name = document.getElementById('cName').value;
        let prod = document.getElementById('prod').value;
        let price = document.getElementById('price').value;
        if(!name) return alert("يرجى ملء البيانات!");
        document.getElementById('orderBody').innerHTML += `<tr><td>${name}</td><td>${prod}</td><td>${price}</td>
            <td><button onclick="editRow(this)">تعديل</button> <button style="color:red;" onclick="this.parentElement.parentElement.remove()">حذف</button></td></tr>`;
    }

    function editRow(btn) {
        let name = prompt("عدل الاسم:", btn.parentElement.parentElement.cells[0].innerText);
        if(name) btn.parentElement.parentElement.cells[0].innerText = name;
    }

    // التحكم بالألوان
    function previewColor() { document.documentElement.style.setProperty('--main-color', document.getElementById('colorPicker').value); }
    function saveSettings() { localStorage.setItem('siteColor', document.getElementById('colorPicker').value); alert('تم حفظ اللون!'); }
    
    window.onload = () => {
        let saved = localStorage.getItem('siteColor');
        if(saved) { document.documentElement.style.setProperty('--main-color', saved); document.getElementById('colorPicker').value = saved; }
    }

    // المنحنى
    new Chart(document.getElementById('chartDays'), { type: 'line', data: { labels: ['سبت', 'أحد', 'اثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة'], datasets: [{ label: 'الأداء', data: [0,0,0,0,0,0,0], borderColor: '#7e22ce' }] } });
</script>
</body>
</html>
