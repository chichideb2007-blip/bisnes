<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الطلبات</title>
    <style>
        :root { --primary-color: {{ settings.get('theme_color', '#4CAF50') }}; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; }
        .navbar { background-color: var(--primary-color); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        .btn { padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; color: white; }
        .btn-add { background-color: var(--primary-color); }
        .btn-delete { background-color: #ff4d4d; }
        .btn-edit { background-color: #ffa500; }
        
        /* تصميم نافذة التعديل */
        #editModal { display:none; position:fixed; top:20%; left:30%; width: 40%; background:white; padding:20px; border:1px solid #ccc; border-radius:8px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="navbar">
    <h2>{{ settings.get('shop_name', 'طلباتي') }}</h2>
    <div>
        <a href="/dashboard">الطلبات</a>
        <a href="/stats">الإحصائيات</a>
        <a href="/settings">الإعدادات</a>
        <a href="/logout">خروج</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3>إضافة طلب جديد</h3>
        <form action="/add-order" method="POST">
            <input type="text" name="name" placeholder="اسم المنتج" required>
            <input type="text" name="customer_name" placeholder="اسم الزبون">
            <input type="number" name="price" placeholder="السعر" required>
            <button type="submit" class="btn btn-add">إضافة</button>
        </form>
    </div>

    <div class="card">
        <h3>إجمالي المبيعات: {{ total_sales }} دج</h3>
        <table>
            <thead>
                <tr>
                    <th>المنتج</th>
                    <th>اسم الزبون</th>
                    <th>السعر</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                <tr>
                    <td>{{ order.product_name }}</td>
                    <td>{{ order.customer_name }}</td>
                    <td>{{ order.total_price }} دج</td>
                    <td>
                        <button onclick="showEditForm('{{ order.id }}', '{{ order.product_name }}', '{{ order.customer_name }}', '{{ order.total_price }}')" class="btn btn-edit">تعديل</button>
                        <form action="/delete-order" method="POST" style="display:inline;">
                            <input type="hidden" name="order_id" value="{{ order.id }}">
                            <button type="submit" class="btn btn-delete">حذف</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div id="editModal">
    <h3>تعديل الطلب</h3>
    <form action="/edit-order" method="POST">
        <input type="hidden" name="order_id" id="edit_id">
        <input type="text" name="name" id="edit_name" placeholder="اسم المنتج" required><br>
        <input type="text" name="customer_name" id="edit_customer" placeholder="اسم الزبون"><br>
        <input type="number" name="price" id="edit_price" placeholder="السعر" required><br>
        <button type="submit" class="btn btn-add">حفظ التعديلات</button>
        <button type="button" onclick="document.getElementById('editModal').style.display='none'">إلغاء</button>
    </form>
</div>

<script>
    function showEditForm(id, name, customer, price) {
        document.getElementById('editModal').style.display = 'block';
        document.getElementById('edit_id').value = id;
        document.getElementById('edit_name').value = name;
        document.getElementById('edit_customer').value = customer;
        document.getElementById('edit_price').value = price;
    }
</script>

</body>
</html>
