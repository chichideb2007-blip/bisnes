<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الرئيسية</title>
    <!-- مكتبة الرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .stats-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between;">
    <h2>مرحباً بك في لوحة تحكم الطلبات</h2>
    <div>
        <a href="/orders">الطلبات</a> | 
        <a href="/settings">الإعدادات</a> | 
        <a href="/logout" style="color: red;">خروج</a>
    </div>
</div>

<!-- بطاقة الإحصائيات -->
<div class="stats-card">
    <h3>إجمالي المبيعات اليومي</h3>
    <h1 style="color: #28a745;">{{ total_today }} دج</h1>
    <canvas id="myChart" style="max-width: 600px; margin: auto;"></canvas>
</div>

<!-- جدول الطلبات -->
<div class="card">
    <h3>أحدث الطلبات</h3>
    <table>
        <thead>
            <tr><th>الزبون</th><th>التفاصيل</th><th>السعر</th></tr>
        </thead>
        <tbody>
            {% for o in orders %}
            <tr>
                <td>{{ o.customer_name }}</td>
                <td>{{ o.order_details }}</td>
                <td>{{ o.price }} دج</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['اليوم'],
            datasets: [{
                label: 'الأرباح (دج)',
                data: [{{ total_today }}],
                borderColor: '#007bff',
                fill: true
            }]
        }
    });
</script>

</body>
</html>
