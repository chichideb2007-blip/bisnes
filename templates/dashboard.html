<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #7e22ce; --secondary: #a855f7; }
        body { font-family: sans-serif; background: #f9fafb; margin: 0; padding: 10px; }
        
        /* تصميم الأزرار (Tabs) */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 10px; border: none; background: #ddd; cursor: pointer; border-radius: 8px; }
        .tabs button.active { background: var(--primary); color: white; }
        
        .tab-content { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        
        .stat-card { background: #f3e8ff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-right: 5px solid var(--primary); }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<!-- أزرار التنقل بين الصفحات -->
<div class="tabs">
    <button class="active" onclick="openTab(event, 'stats')">الإحصائيات</button>
    <button onclick="openTab(event, 'settings')">الإعدادات</button>
    <button onclick="openTab(event, 'orders')">الطلبات</button>
</div>

<!-- 1. صفحة الإحصائيات -->
<div id="stats" class="tab-content active">
    <h2>الإحصائيات والمصروفات</h2>
    <div class="stat-card">مجموع المصروف اليومي: 0.0 دج</div>
    <canvas id="chartDays"></canvas>
    <canvas id="chartMonths"></canvas>
    <canvas id="chartYears"></canvas>
</div>

<!-- 2. صفحة الإعدادات -->
<div id="settings" class="tab-content">
    <h2>إعدادات المتجر وتخصيص الألوان</h2>
    <input type="text" placeholder="اسم المتجر">
    <button class="btn-action" style="margin-top:10px;">حفظ المعلومات</button>
</div>

<!-- 3. صفحة الطلبات -->
<div id="orders" class="tab-content">
    <h2>جدول الطلبات</h2>
    <input type="text" placeholder="اسم الزبون" style="margin-bottom:10px;">
    <button class="btn-action">حفظ الطلبية</button>
</div>

<script>
    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }
    
    // إعداد الرسوم البيانية (مبسط)
    new Chart(document.getElementById('chartDays'), { type: 'line', data: { labels: ['سبت', 'أحد', 'اثنين'], datasets: [{ data: [0, 0, 0], borderColor: '#7e22ce' }] } });
    new Chart(document.getElementById('chartMonths'), { type: 'bar', data: { labels: ['جانفي', 'فيفري'], datasets: [{ data: [0, 0], backgroundColor: '#a855f7' }] } });
    new Chart(document.getElementById('chartYears'), { type: 'line', data: { labels: ['2024', '2025', '2026'], datasets: [{ data: [0, 0, 0], borderColor: '#7e22ce' }] } });
</script>

</body>
</html>
