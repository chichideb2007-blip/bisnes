<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: {{ settings.primary_color }}; --secondary: {{ settings.secondary_color }}; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .top-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .box { flex: 1; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 12px; width: 100%; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; margin-top: 10px; }
        .nav-btn { display: inline-block; padding: 8px 15px; background: #333; color: white; border-radius: 5px; text-decoration: none; margin: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

    <div class="top-row">
        <div class="box">
            <h3>📊 الإحصائيات</h3>
            <canvas id="chartWeek"></canvas>
            <canvas id="chartMonth"></canvas>
            <canvas id="chartYear"></canvas>
            <a href="/" class="nav-btn">لوحة التحكم</a>
            <a href="/login" class="nav-btn" style="background:red;">تسجيل الخروج</a>
        </div>

        <div class="box">
            <h3>⚙️ الإعدادات</h3>
            <form action="/update-info" method="POST">
                <input name="shop_name" value="{{ settings.shop_name }}" placeholder="اسم المتجر">
                <input name="bot_token" value="{{ settings.telegram_bot_token }}" placeholder="Bot Token">
                <input name="chat_id" value="{{ settings.telegram_chat_id }}" placeholder="Chat ID">
                <button class="btn" style="background:var(--primary);">حفظ المعلومات</button>
            </form>
            <form action="/update-colors" method="POST">
                <input type="color" name="primary_color" value="{{ settings.primary_color }}">
                <input type="color" name="secondary_color" value="{{ settings.secondary_color }}">
                <button class="btn" style="background:var(--secondary);">حفظ الألوان</button>
            </form>
            <a href="/login" class="nav-btn" style="background:red;">خروج لصفحة الدخول</a>
        </div>
    </div>

    <div class="box">
        <h3>➕ إضافة طلبية جديدة</h3>
        <form action="/add-order" method="POST">
            <input name="name" placeholder="اسم الزبون" required>
            <input name="product" placeholder="المنتج" required>
            <input name="price" type="number" placeholder="السعر" required>
            <button class="btn" style="background:var(--primary);">تأكيد وحفظ الطلبية</button>
        </form>

        <h3>📦 الطلبات المسجلة</h3>
        <table>
            <tr><th>الاسم</th><th>المنتج</th><th>السعر</th><th>حذف</th></tr>
            {% for o in orders %}
            <tr>
                <td>{{ o.customer_name }}</td>
                <td>{{ o.product_name }}</td>
                <td>{{ o.total_price }}</td>
                <td><form action="/delete-order" method="POST"><input type="hidden" name="order_id" value="{{ o.id }}"><button>🗑️</button></form></td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <script>
        function createChart(id, label, data) {
            new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: ['1', '2', '3', '4', '5'], datasets: [{ label: label, data: data, borderColor: '#7a3e13' }] }
            });
        }
        createChart('chartWeek', 'مبيعات الأسبوع', [10, 20, 15, 30, 25]);
        createChart('chartMonth', 'مبيعات الشهر', [100, 200, 150, 400, 300]);
        createChart('chartYear', 'مبيعات السنة', [1000, 2000, 1500, 4000, 3500]);
    </script>
</body>
</html>
