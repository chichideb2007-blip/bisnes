<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الرئيسية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .navbar { background: #333; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stats-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="navbar">
    <strong>نظام إدارة الطلبات</strong>
    <a href="/logout" style="color: #ffcccc; text-decoration: none;">خروج</a>
</div>

<div class="stats-box">
    <h3>إجمالي المبيعات (اليوم)</h3>
    <h1 style="color: #28a745;">{{ total }} دج</h1>
    <canvas id="myChart" style="max-width: 400px; margin: auto;"></canvas>
</div>

<div class="card">
    <h3>أحدث الطلبات</h3>
    <table>
        <thead><tr><th>الزبون</th><th>التفاصيل</th><th>السعر</th></tr></thead>
        <tbody>
            {% for o in orders %}
            <tr>
                <td>{{ o.customer_name }}</td>
                <td>{{ o.order_details }}</td>
                <td>{{ o.price }} دج</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="card">
    <h3>إضافة طلب جديد</h3>
    <form action="/add-order" method="POST">
        <input name="name" placeholder="اسم الزبون" required>
        <input name="details" placeholder="التفاصيل">
        <input name="price" type="number" placeholder="السعر" required>
        <button type="submit">إضافة الطلب</button>
    </form>
</div>

<script>
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['اليوم'],
            datasets: [{
                label: 'الأرباح (دج)',
                data: [{{ total }}],
                backgroundColor: 'rgba(40, 167, 69, 0.2)',
                borderColor: '#28a745',
                borderWidth: 3
            }]
        }
    });
</script>

</body>
</html>
