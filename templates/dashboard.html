<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <style>
        :root { --main-color: {{ settings.primary_color }}; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .page { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; }
        .btn { width: 100%; padding: 10px; background: var(--main-color); color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <h2>مرحباً في {{ settings.shop_name }}</h2>
    
    <div class="page">
        <h3>إضافة طلبية</h3>
        <form action="/add-order" method="POST">
            <input type="text" name="name" placeholder="الاسم" required>
            <input type="text" name="product" placeholder="المنتج" required>
            <input type="number" name="price" placeholder="السعر" required>
            <input type="text" name="phone" placeholder="الهاتف" required>
            <button class="btn" type="submit">حفظ الطلبية</button>
        </form>
    </div>

    <div class="page">
        <h3>الطلبيات</h3>
        <table>
            <tr><th>الزبون</th><th>المنتج</th><th>السعر</th><th>الهاتف</th></tr>
            {% for o in orders %}
            <tr><td>{{ o.customer_name }}</td><td>{{ o.product_name }}</td><td>{{ o.total_price }}</td><td>{{ o.customer_phone }}</td></tr>
            {% endfor %}
        </table>
    </div>

    <div class="page">
        <h3>الإعدادات</h3>
        <form action="/update-info" method="POST">
            <input type="text" name="shop_name" value="{{ settings.shop_name }}">
            <input type="color" name="primary_color" value="{{ settings.primary_color }}">
            <button class="btn" type="submit">تحديث الإعدادات</button>
        </form>
        <a href="/logout">تسجيل الخروج</a>
    </div>
</body>
</html>
