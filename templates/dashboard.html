<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        :root { --primary: {{ settings.primary_color }}; --secondary: {{ settings.secondary_color }}; }
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn { border: none; padding: 10px; color: white; cursor: pointer; width: 100%; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>⚙️ إعدادات المتجر</h3>
        <form action="/update-info" method="POST">
            <input name="shop_name" value="{{ settings.shop_name }}">
            <input name="bot_token" placeholder="Bot Token">
            <input name="chat_id" placeholder="Chat ID">
            <button class="btn" style="background:var(--primary)">حفظ المعلومات</button>
        </form>
        <hr>
        <form action="/update-colors" method="POST">
            <input type="color" name="primary_color" value="{{ settings.primary_color }}">
            <input type="color" name="secondary_color" value="{{ settings.secondary_color }}">
            <button class="btn" style="background:var(--secondary)">حفظ الألوان</button>
        </form>
    </div>

    <div class="card">
        <h3>➕ إضافة طلب جديد</h3>
        <form action="/add-order" method="POST">
            <input name="name" placeholder="الاسم" required>
            <input name="product" placeholder="المنتج" required>
            <input name="price" type="number" placeholder="السعر" required>
            <input name="phone" placeholder="رقم الهاتف">
            <button class="btn" style="background:var(--primary)">حفظ الطلبية</button>
        </form>
    </div>

    <a href="/logout" class="btn" style="background:red; text-align:center; display:block; text-decoration:none;">خروج من الحساب</a>
</body>
</html>
