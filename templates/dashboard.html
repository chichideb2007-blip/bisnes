<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <style>
        /* تطبيق لون المتجر المختار */
        :root {
            --primary-color: {{ settings.get('theme_color', '#4CAF50') }};
        }
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f9; }
        .navbar { background-color: var(--primary-color); padding: 15px; color: white; display: flex; justify-content: space-between; }
        .container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: var(--primary-color); color: white; }
        .btn { padding: 10px 20px; color: white; border: none; cursor: pointer; text-decoration: none; border-radius: 5px; }
        .btn-add { background-color: var(--primary-color); }
        .btn-logout { background-color: #ff4d4d; }
    </style>
</head>
<body>

<div class="navbar">
    <h2>مرحباً في لوحة تحكم {{ settings.get('shop_name', 'متجرك') }}</h2>
    <div>
        <a href="/settings" class="btn">الإعدادات</a>
        <a href="/stats" class="btn">الإحصائيات</a>
        <a href="/logout" class="btn btn-logout">تسجيل الخروج</a>
    </div>
</div>

<div class="container">
    <h3>إضافة منتج جديد</h3>
    <form action="/add-product" method="POST">
        <input type="text" name="name" placeholder="اسم المنتج" required>
        <input type="number" name="price" placeholder="السعر" required>
