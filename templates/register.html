<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب مدير جديد</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .form-container { border: 1px solid #ddd; padding: 30px; border-radius: 12px; width: 320px; background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .login-link { margin-top: 15px; display: block; color: #007bff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>تسجيل حساب جديد</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة السر" required>
            <input type="email" name="email" placeholder="بريدك الإلكتروني (لاستقبال الطلبات)" required>
            
            <button type="submit">إنشاء الحساب</button>
        </form>
        <a href="/login" class="login-link">لديك حساب بالفعل؟ سجل دخولك</a>
    </div>

</body>
</html>
