<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب جديد</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .form-container { border: 1px solid #ccc; padding: 30px; border-radius: 10px; width: 300px; }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 8px; }
        button { width: 100%; padding: 10px; background-color: green; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>إنشاء حساب مدير جديد</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة السر" required>
            <button type="submit">تسجيل الحساب</button>
        </form>
        <p>لديك حساب بالفعل؟ <a href="/login">تسجيل الدخول</a></p>
    </div>

</body>
</html>
