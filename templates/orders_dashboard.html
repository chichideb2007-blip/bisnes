<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلبات</title>
    <style>
        /* نستخدم اللون الذي اخترتِه في الإعدادات */
        :root { --primary-color: {{ settings.primary_color|default('#7e22ce') }}; }
        
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary-color); text-align: center; }
        
        /* تنسيق النموذج */
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        button { grid-column: span 2; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        
        /* تنسيق الجدول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: var(--primary-color); color: white; }
        
        .delete-btn { color: red; text-decoration: none; font-weight: bold; }
        .nav { margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <a href="{{ url_for('dashboard') }}">الرئيسية</a> | 
        <a href="{{ url_for('stats') }}">الإحصائيات</a> | 
        <a href="{{ url_for('settings') }}">الإعدادات</a> | 
        <a href="{{ url_for('logout') }}">خروج</a>
    </div>

    <h2>طلبيات متجر: {{ settings.shop_name|default('متجري') }}</h2>

    <form action="{{ url_for('orders') }}" method="POST">
        <input type="text" name="customer_name" placeholder="اسم الزبون" required>
        <input type="text" name="product_name" placeholder="اسم المنتج" required>
        <input type="number" name="total_price" placeholder="السعر" required>
        <input type="text" name="customer_phone" placeholder="رقم الهاتف" required>
        <button type="submit">إضافة الطلب</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>الزبون</th>
                <th>المنتج</th>
                <th>السعر</th>
                <th>الهاتف</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody>
            {% for o in orders %}
            <tr>
                <td>{{ o.customer_name }}</td>
                <td>{{ o.product_name }}</td>
                <td>{{ o.total_price }}</td>
                <td>{{ o.customer_phone }}</td>
                <td>
                    <a href="{{ url_for('delete_order', id=o.id) }}" class="delete-btn" onclick="return confirm('هل أنت متأكد؟')">حذف</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
