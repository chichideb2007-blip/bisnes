<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الطلبيات</title>
</head>
<body>
    <h1>إدارة الطلبيات</h1>
    
    <form action="/orders" method="POST">
        <input type="text" name="customer_name" placeholder="اسم الزبون" required>
        <input type="text" name="product_name" placeholder="اسم المنتج" required>
        <input type="number" name="total_price" placeholder="السعر" required>
        <input type="text" name="customer_phone" placeholder="رقم الهاتف" required>
        <button type="submit">حفظ الطلبية</button>
    </form>

    <hr>

    <h2>الطلبيات المسجلة</h2>
    <table border="1">
        <tr>
            <th>الزبون</th><th>المنتج</th><th>السعر</th><th>الهاتف</th>
        </tr>
        {% for order in orders %}
        <tr>
            <td>{{ order.customer_name }}</td>
            <td>{{ order.product_name }}</td>
            <td>{{ order.total_price }}</td>
            <td>{{ order.customer_phone }}</td>
        </tr>
        {% endfor %}
    </table>
    
    <br>
    <a href="{{ url_for('dashboard') }}">رجوع للوحة التحكم</a>
</body>
</html>
