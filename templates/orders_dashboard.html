<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلبيات</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th { background-color: #f4f4f4; }
        .btn-delete { 
            background-color: #d9534f; 
            color: white; 
            padding: 5px 10px; 
            text-decoration: none; 
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-delete:hover { background-color: #c9302c; }
    </style>
</head>
<body>

    <h1>إدارة الطلبيات</h1>

    <table>
        <thead>
            <tr>
                <th>الزبون</th>
                <th>المنتج</th>
                <th>السعر</th>
                <th>الهاتف</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.customer_name }}</td>
                <td>{{ order.product_name }}</td>
                <td>{{ order.total_price }}</td>
                <td>{{ order.customer_phone }}</td>
                <td>
                    <a href="{{ url_for('delete_order', order_id=order.id) }}" 
                       class="btn-delete" 
                       onclick="return confirm('هل أنت متأكدة من حذف هذه الطلبية؟')">
                       حذف
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
