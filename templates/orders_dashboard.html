<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلبيات</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .form-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <h1>إدارة الطلبيات</h1>

    <div class="form-container">
        <h3>إضافة طلبية جديدة</h3>
        <form action="/orders" method="POST">
            <input type="text" name="customer_name" placeholder="اسم الزبون" required>
            <input type="text" name="phone" placeholder="رقم الهاتف" required>
            <input type="text" name="product_name" placeholder="اسم المنتج" required>
            <input type="number" step="0.01" name="price" placeholder="السعر" required>
            <button type="submit">حفظ الطلبية</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>الزبون</th>
                <th>الهاتف</th>
                <th>المنتج</th>
                <th>السعر</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.customer_name }}</td>
                <td>{{ order.customer_phone }}</td>
                <td>{{ order.product_name }}</td>
                <td>{{ order.total_price }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4">لا توجد طلبيات حالياً</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <br>
    <a href="/dashboard">الرجوع للوحة التحكم</a>

</body>
</html>
