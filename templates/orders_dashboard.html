<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة الطلبيات</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f2f2f2; }
        .form-container { background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 15px; }
        input { padding: 8px; margin-left: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #218838; }
        .back-btn { background-color: #007bff; margin-top: 20px; display: inline-block; text-decoration: none; color: white; padding: 10px 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>إدارة الطلبيات</h1>

    <div class="form-container">
        <h3>إضافة طلبية جديدة</h3>
        <form action="/orders" method="POST">
            <div class="form-group">
                <input type="text" name="customer_name" placeholder="اسم الزبون" required>
                <input type="text" name="phone" placeholder="رقم الهاتف" required>
                <input type="text" name="product_name" placeholder="اسم المنتج" required>
                <input type="number" step="0.01" name="price" placeholder="السعر" required>
                <button type="submit">حفظ المعلومات</button>
            </div>
        </form>
    </div>

    <table>
        <tr>
            <th>اسم الزبون</th>
            <th>رقم الهاتف</th>
            <th>اسم المنتج</th>
            <th>السعر الإجمالي</th>
            <th>الإجراءات</th>
        </tr>
        {% for order in orders %}
        <tr>
            <td>{{ order.customer_name }}</td>
            <td>{{ order.customer_phone }}</td>
            <td>{{ order.product_name }}</td>
            <td>{{ order.total_price }}</td>
            <td><button style="background-color: #dc3545;">حذف</button></td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/dashboard" class="back-btn">رجوع للوحة التحكم</a>
    <a href="/logout"><button style="background-color: #6c757d;">خروج</button></a>
</body>
</html>
