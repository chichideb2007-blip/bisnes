<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلبيات</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        
        /* تنسيق نموذج الإضافة */
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { grid-column: span 2; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* تنسيق الجدول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        
        /* تنسيق زر الحذف */
        .btn-delete { background-color: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-delete:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="container">
    <h1>إدارة الطلبيات</h1>

    <form action="/orders" method="POST">
        <input type="text" name="customer_name" placeholder="اسم الزبون" required>
        <input type="text" name="product_name" placeholder="اسم المنتج" required>
        <input type="number" step="0.01" name="total_price" placeholder="السعر" required>
        <input type="text" name="customer_phone" placeholder="رقم الهاتف" required>
        <button type="submit">حفظ الطلبية</button>
    </form>

    <hr>

    <table>
        <tr>
            <th>الزبون</th>
            <th>المنتج</th>
            <th>السعر</th>
            <th>الهاتف</th>
            <th>إجراء</th>
        </tr>
        {% for order in orders %}
        <tr>
            <td>{{ order.customer_name }}</td>
            <td>{{ order.product_name }}</td>
            <td>{{ order.total_price }}</td>
            <td>{{ order.customer_phone }}</td>
            <td>
                <form action="{{ url_for('delete_order', order_id=order.id) }}" method="POST" onsubmit="return confirm('هل أنتِ متأكدة من حذف هذه الطلبية؟');">
                    <button type="submit" class="btn-delete">حذف</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <div style="text-align: center;">
        <a href="{{ url_for('dashboard') }}">الرجوع للوحة التحكم</a>
    </div>
</div>

</body>
</html>
