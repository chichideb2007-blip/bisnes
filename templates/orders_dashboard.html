<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلبيات</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .order-form { display: grid; gap: 10px; margin-bottom: 30px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #007bff; color: white; }
        .btn-delete { color: red; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>إضافة طلبية جديدة</h2>
    <form method="POST" class="order-form">
        <input type="text" name="customer_name" placeholder="اسم الزبون" required>
        <input type="text" name="phone" placeholder="رقم الهاتف" required>
        <input type="text" name="product_name" placeholder="اسم المنتج" required>
        <input type="number" step="0.01" name="price" placeholder="السعر الإجمالي" required>
        <button type="submit">حفظ الطلبية</button>
    </form>

    <h2>الطلبيات الحالية</h2>
    <table>
        <thead>
            <tr>
                <th>الزبون</th>
                <th>الهاتف</th>
                <th>المنتج</th>
                <th>السعر</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.customer_name }}</td>
                <td>{{ order.customer_phone }}</td>
                <td>{{ order.product_name }}</td>
                <td>{{ order.total_price }}</td> <td>
                    <a href="{{ url_for('delete_order', order_id=order.id) }}" 
                       onclick="return confirm('هل أنت متأكد من الحذف؟');" 
                       class="btn-delete">حذف</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="/dashboard">العودة للوحة التحكم</a>
</div>

</body>
</html>
