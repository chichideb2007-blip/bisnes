<form id="orderForm">
    <!-- بيانات الزبون -->
    <input type="text" id="customer_name" placeholder="الاسم الكامل" required>
    <input type="tel" id="phone" placeholder="رقم الهاتف" required>
    
    <!-- اختيار الولاية والبلدية -->
    <select id="wilaya" onchange="updateDelivery()"> <!-- هنا تضعين قائمة الولايات --> </select>
    <select id="commune"></select>

    <!-- خيار التوصيل -->
    <select id="delivery_type" onchange="calculateTotal()">
        <option value="home">توصيل للمنزل</option>
        <option value="office">توصيل للمكتب</option>
    </select>

    <!-- المجموع التلقائي -->
    <div id="total_price">المجموع: 0 دج</div>
    
    <button type="submit">تأكيد الطلب</button>
</form>
