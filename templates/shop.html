<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجرنا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; }
        h1 { text-align: center; color: #333; }
        
        .products-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        
        .product-card { 
            background: white; 
            border: 1px solid #ddd; 
            padding: 15px; 
            margin: 10px; 
            border-radius: 12px; 
            width: 280px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .product-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 10px; 
        }
        
        .price { color: #28a745; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        
        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* لضمان عدم خروج الحقول عن الإطار */
        }
        
        button {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>مرحباً بك في متجرنا</h1>
    
    <div class="products-list">
        {% for product in products %}
            <div class="product-card">
                <!-- عرض الصورة إذا كانت موجودة -->
                {% if product['product-images'] %}
                    <img src="{{ product['product-images'] }}" alt="{{ product.name }}">
                {% endif %}
                
                <h2>{{ product.name }}</h2>
                <p class="price">السعر: {{ product.price }} دج</p>

                <!-- نموذج الطلب المدمج -->
                <form action="/submit-order" method="POST">
                    <input type="hidden" name="product_id" value="{{ product.id }}">
                    <input type="text" name="customer_name" placeholder="اسمك الكريم" required>
                    <input type="tel" name="phone" placeholder="رقم الهاتف" required>
                    <button type="submit">تأكيد الطلب</button>
                </form>
            </div>
        {% else %}
            <p>لا توجد منتجات متاحة حالياً.</p>
        {% endfor %}
    </div>

</body>
</html>
