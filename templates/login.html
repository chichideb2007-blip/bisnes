<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول للمتجر</title>
    <style>
        :root {
            /* جلب الألوان ديناميكياً من قاعدة البيانات بدلاً من تثبيتها */
            --primary: {{ settings.primary_color if settings and settings.primary_color else '#a855f7' }};
            --secondary: {{ settings.secondary_color if settings and settings.secondary_color else '#7e22ce' }};
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .login-container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.6em;
            position: relative;
            padding-bottom: 10px;
        }
        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
        }
        label {
            display: block;
            text-align: right;
            margin-top: 15px;
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 6px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1em;
            background: #fafafa;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.2);
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s;
            box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3);
        }
        .btn:hover {
            background: var(--secondary);
        }
        p {
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <form method="POST" action="/login">
            <h2>تسجيل الدخول</h2>
            
            <label>البريد الإلكتروني</label>
            <input type="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>
            
            <label>كلمة السر</label>
            <input type="password" name="password" placeholder="أدخل كلمة السر" required>
            
            <button type="submit" class="btn">دخول إلى لوحة التحكم</button>
            
            <p>ليس لديك حساب؟ <a href="/register">إنشاء حساب جديد</a></p>
        </form>
    </div>

</body>
</html>
