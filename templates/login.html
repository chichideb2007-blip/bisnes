<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - كود الشركة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .register-link { margin-top: 15px; display: block; color: #666; text-decoration: none; }
        .register-link a { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-container">
    {% include 'translate.html' %}
    
    <h2>تسجيل الدخول</h2>
    
    <form action="/login" method="POST">
        <input type="text" name="company_code" placeholder="أدخل كود شركتك" required>
        <button type="submit">دخول</button>
    </form>
    
    <div class="register-link">
        ليس لديك حساب؟ <a href="/signup">إنشاء حساب جديد</a>
    </div>
</div>

</body>
</html>
