<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 300px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>تسجيل الدخول</h2>
    <form action="/login" method="POST">
        <label>البريد الإلكتروني:</label>
        <input type="text" name="username" placeholder="اكتب اسم المستخدم هنا" required>
        
        <label>كلمة السر:</label>
        <input type="password" name="password" placeholder="اكتب كلمة السر هنا" required>
        
        <button type="submit">دخول</button>
    </form>
</div>

</body>
</html>
