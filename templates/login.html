<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
</head>
<body>
    <h2>تسجيل الدخول إلى حسابك</h2>

    {% if error %}
        <p style="color: red; font-weight: bold;">{{ error }}</p>
    {% endif %}

    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="اسم المستخدم" required><br><br>
        <input type="email" name="email" placeholder="البريد الإلكتروني" required><br><br>
        <input type="password" name="password" placeholder="كلمة السر" required><br><br>
        <button type="submit">دخول</button>
    </form>
</body>
</html>
