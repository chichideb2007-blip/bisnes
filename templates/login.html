<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة الإدارة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .register-link { margin-top: 15px; font-size: 14px; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>مرحباً بك مجدداً</h2>
    <p>سجل دخولك لإدارة طلباتك</p>
    
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="البريد الإلكتروني" required>
        <input type="password" name="password" placeholder="كلمة السر" required>
        <button type="submit">دخول</button>
    </form>

    <div class="register-link">
        <p>لا تملك حساباً؟ <a href="/register">أنشئ حساباً جديداً الآن</a></p>
    </div>
</div>

</body>
</html>
