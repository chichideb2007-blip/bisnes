<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المخزون</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 600px; } /* صغرت العرض ليناسب الهاتف */
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 30px; }
    </style>
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>إدارة المخزون</h2>
        <div>
            <a href="/dashboard" class="btn btn-secondary btn-sm">لوحة التحكم</a>
            <a href="/logout" class="btn btn-danger btn-sm">خروج</a>
        </div>
    </div>

    <form action="/products" method="POST" enctype="multipart/form-data" class="card p-4">
        <h5 class="mb-3 text-primary">إضافة منتج جديد</h5>
        <input type="text" name="name" class="form-control mb-2" placeholder="اسم المنتج" required>
        <input type="number" name="quantity" class="form-control mb-2" placeholder="الكمية" required>
        <input type="number" step="0.01" name="price" class="form-control mb-2" placeholder="السعر (دج)" required>
        
        <div class="mb-3">
            <label class="form-label small text-muted">صورة المنتج:</label>
            <input type="file" name="product_image" class="form-control" accept="image/*">
        </div>
        
        <button type="submit" class="btn btn-primary w-100">إضافة المنتج للمخزن</button>
    </form>

    <div class="card p-3">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>صورة</th>
                    <th>المنتج</th>
                    <th>الكمية</th>
                    <th>السعر</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>
                        {% if p.image_url %}
                            <img src="{{ p.image_url }}" width="40" class="rounded" alt="صورة">
                        {% else %}
                            <small class="text-muted">لا يوجد</small>
                        {% endif %}
                    </td>
                    <td><strong>{{ p.name }}</strong></td>
                    <td><span class="badge {{ 'bg-success' if p.quantity > 5 else 'bg-warning' }}">{{ p.quantity }}</span></td>
                    <td>{{ p.price }}</td>
                    <td><a href="/delete_product/{{ p.id }}" class="btn btn-outline-danger btn-sm" onclick="return confirm('هل أنت متأكد؟')">🗑️</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
