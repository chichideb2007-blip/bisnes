<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المخزون</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .form-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h3>إضافة منتج جديد</h3>
        <form id="productForm" action="/products" method="POST">
            <input type="text" name="name" placeholder="اسم المنتج" required>
            <input type="number" name="quantity" placeholder="الكمية" required>
            <input type="number" step="0.01" name="price" placeholder="السعر" required>
            
            <input type="hidden" name="product-images" id="image_url_input">
            
            <label>اختر صورة من المعرض:</label>
            <input type="file" id="fileInput" accept="image/*">
            
            <button type="submit" class="btn-save">حفظ المنتج</button>
        </form>
    </div>

    <script>
        // قومي بوضع الروابط الخاصة بمشروعك هنا
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        document.getElementById('productForm').onsubmit = async (e) => {
            const fileInput = document.getElementById('fileInput');
            
            // إذا تم اختيار صورة
            if (fileInput.files.length > 0) {
                e.preventDefault(); // إيقاف الإرسال العادي
                const file = fileInput.files[0];
                const fileName = Date.now() + '_' + file.name;

                // 1. رفع الصورة إلى الـ Bucket
                const { data, error } = await supabase.storage
                    .from('product-images')
                    .upload(fileName, file);

                if (error) { alert('خطأ في رفع الصورة: ' + error.message); return; }

                // 2. الحصول على الرابط العام
                const { data: publicURL } = supabase.storage
                    .from('product-images')
                    .getPublicUrl(fileName);

                // 3. وضع الرابط في الحقل المخفي وإرسال الفورم
                document.getElementById('image_url_input').value = publicURL.publicUrl;
                document.getElementById('productForm').submit();
            }
        };
    </script>
</body>
</html>
