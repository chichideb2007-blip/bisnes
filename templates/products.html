<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المخزن</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; text-align: center; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th { background-color: #f2f2f2; }
        input { padding: 8px; width: 100px; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; background-color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h2>مخزن المنتجات الخاص بك</h2>
        <table>
            <thead>
                <tr>
                    <th>اسم المنتج</th>
                    <th>الكمية</th>
                    <th>السعر</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p.name }}</td>
                    <td>{{ p.quantity }}</td>
                    <td>{{ p.price }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <h3 style="margin-top:30px;">إضافة منتج جديد</h3>
        <form action="/add_product" method="POST">
            <input type="text" name="name" placeholder="اسم المنتج" required>
            <input type="number" name="quantity" placeholder="الكمية" required>
            <input type="number" name="price" placeholder="السعر" required>
            <button type="submit" class="btn">إضافة</button>
        </form>
    </div>
</body>
</html>
