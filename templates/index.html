<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة زبون جديد</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 50px; 
            background-color: #f4f4f4; 
            text-align: center; 
        }
        .container {
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            width: 330px; 
            margin: 0 auto; 
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            box-sizing: border-box; 
        }
        button, .btn { 
            background-color: #4CAF50; 
            color: white; 
            padding: 10px; 
            border: none; 
            width: 100%; 
            cursor: pointer; 
            font-size: 16px;
            border-radius: 4px;
            display: block;
            text-decoration: none;
            box-sizing: border-box;
            margin-top: 10px;
        }
        .btn-users {
            background-color: #008CBA; /* لون أزرق لقائمة الزبائن */
        }
        .btn-logout {
            background-color: #f44336; /* لون أحمر لزر الخروج */
            width: auto;
            display: inline-block;
            padding: 8px 15px;
            margin-bottom: 20px;
            float: left;
        }
        .clearfix {
            clear: both;
        }
    </style>
</head>
<body>

    <!-- زر الخروج يظهر الفوق على اليسار -->
    <a href="/login" class="btn btn-logout">تسجيل الخروج</a>
    <div class="clearfix"></div>

    <div class="container">
        <h2>إضافة زبون جديد</h2>
        
        <!-- الفورم مغلوقة ومصححة هنا -->
        <form action="/add" method="GET">
            <input type="text" name="username" placeholder="اسم الزبون" required>
            <button type="submit">حفظ البيانات</button>
        </form>

        <br>
        <!-- زر قائمة الزبائن يظهر بشكل منظم هنا -->
        <a href="/users" class="btn btn-users">عرض قائمة الزبائن</a>
    </div>

</body>
</html>
