<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | إدارة الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-stone-50 min-h-screen">

    <nav class="bg-amber-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-xl">مرحباً بك في لوحة الإدارة</h1>
        <a href="/logout" class="bg-amber-700 px-4 py-2 rounded-xl text-sm hover:bg-amber-600 transition">خروج</a>
    </nav>

    <div class="max-w-4xl mx-auto p-4 space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-md border border-stone-100">
            <h2 class="text-xl font-bold text-stone-800 mb-4">إضافة طلب جديد</h2>
            <form action="/add_data" method="POST" class="flex gap-2">
                <input type="text" name="order_name" placeholder="ما هو الطلب الجديد؟" required 
                    class="flex-1 px-4 py-3 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500">
                <button type="submit" class="bg-amber-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-amber-700 transition">حفظ</button>
            </form>
        </div>

        <div class="bg-white rounded-3xl shadow-md border border-stone-100 overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-stone-100 text-stone-600">
                    <tr>
                        <th class="p-4">اسم الطلب</th>
                        <th class="p-4">الحالة</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-stone-100">
                    {% for item in users %}
                    <tr class="hover:bg-stone-50 transition">
                        <td class="p-4 font-medium text-stone-800">{{ item.order_name }}</td>
                        <td class="p-4">
                            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">تم الاستلام</span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
