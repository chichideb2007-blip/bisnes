<<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إدارة الزبائن</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h2>إضافة زبون جديد</h2>
        <form action="/add_user" method="POST">
            <input type="text" name="customer_name" placeholder="اسم الزبون" required>
            <button type="submit">حفظ البيانات</button>
        </form>

        <hr>

        <h2>قائمة الزبائن</h2>
        {% if users %}
            <table>
                {% for user in users %}
                <tr><td>{{ user.customer_name }}</td></tr>
                {% endfor %}
            </table>
        {% else %}
            <p>لا يوجد زبائن حالياً. ابدئي بإضافة أول زبون!</p>
        {% endif %}
    </div>
</body>
</html>
