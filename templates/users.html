<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلبيات</title>
    <!-- استعارة التنسيق من base.html إذا كان مرتبطاً به -->
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        .btn-delete { 
            background-color: #d9534f; 
            color: white; 
            padding: 5px 10px; 
            text-decoration: none; 
            border-radius: 4px;
            font-size: 13px;
            display: inline-block;
        }
        .btn-delete:hover { background-color: #c9302c; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('stats') }}">عرض الإحصائيات</a>
        <a href="{{ url_for('logout') }}" style="color: red;">تسجيل الخروج</a>
    </nav>

    <div class="form-container">
        <h1>إضافة طلب جديد</h1>
        <form action="{{ url_for('orders') }}" method="POST">
            <input type="text" name="customer_name" placeholder="اسم الزبون" required>
            <input type="text" name="product_name" placeholder="اسم المنتج" required>
            <input type="number" name="total_price" step="0.01" placeholder="السعر" required>
            <input type="text" name="customer_phone" placeholder="رقم الهاتف" required>
            <button type="submit">إضافة</button>
        </form>
    </div>

    <h1>قائمة الطلبيات</h1>
    <table>
        <thead>
            <tr>
                <th>اسم الزبون</th>
                <th>اسم المنتج</th>
                <th>السعر</th>
                <th>رقم الهاتف</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody>
            {% for item in orders %}
            <tr>
                <td>{{ item.customer_name }}</td>
                <td>{{ item.product_name }}</td>
                <td>{{ item.total_price }}</td>
                <td>{{ item.customer_phone }}</td>
                <td>
                    <!-- الرابط المعدل ليتطابق مع دالة الحذف في main.py -->
                    <a href="{{ url_for('delete_order', order_id=item.id) }}" 
                       class="btn-delete" 
                       onclick="return confirm('هل أنت متأكدة من حذف هذه الطلبية؟')">
                       حذف
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
