<div style="direction: rtl; font-family: Arial; padding: 20px;">
    <h2>لوحة تحكم المدير</h2>
    <div style="background: #f4f4f4; padding: 15px; border-radius: 10px;">
        <h3>إجمالي المبيعات: {{ total }} دج</h3>
    </div>

    <form action="/add" method="POST" style="margin: 20px 0;">
        <input type="text" name="customer_name" placeholder="اسم الزبون" required>
        <input type="text" name="product_name" placeholder="المنتج" required>
        <input type="number" name="total_price" placeholder="السعر" required>
        <button type="submit">إضافة طلب</button>
    </form>

    <table border="1" width="100%" style="border-collapse: collapse;">
        <tr><th>الزبون</th><th>المنتج</th><th>السعر</th><th>إجراء</th></tr>
        {% for order in orders %}
        <tr>
            <td>{{ order.customer_name }}</td>
            <td>{{ order.product_name }}</td>
            <td>{{ order.total_price }}</td>
            <td><a href="/delete/{{ order.id }}">حذف</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
