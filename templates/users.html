<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
</head>
<body>

    <!-- الجزء الجديد: أزرار التنقل -->
    <div style="background-color: #f4f4f4; padding: 15px; text-align: left; margin-bottom: 20px;">
        <a href="/stats" style="margin-left: 15px; text-decoration: none; color: blue;">عرض الإحصائيات</a>
        <a href="/logout" style="text-decoration: none; color: red;">تسجيل الخروج</a>
    </div>

    <!-- الجزء القديم: إضافة طلب -->
    <div style="padding: 20px;">
        <h2>لوحة تحكم الطلبات</h2>
        <form action="/add" method="POST" style="margin-bottom: 20px;">
            <input type="text" name="customer_name" placeholder="اسم الزبون" required>
            <input type="text" name="product_name" placeholder="المنتج" required>
            <input type="number" name="total_price" placeholder="السعر" required>
            <button type="submit">إضافة طلب</button>
        </form>

        <!-- الجدول القديم الموثق في 1000016795.mp4 -->
        <table border="1" width="100%" style="border-collapse: collapse;">
            <tr>
                <th>اسم الزبون</th>
                <th>المنتج</th>
                <th>السعر</th>
                <th>حذف</th>
            </tr>
            {% for item in orders %}
            <tr>
                <td>{{ item.customer_name }}</td>
                <td>{{ item.product_name }}</td>
                <td>{{ item.total_price }}</td>
                <td><a href="/delete/{{ item.id }}">حذف</a></td>
            </tr>
            {% endfor %}
        </table>

        <br>
        <h3>إجمالي الأرباح: {{ total }} دج</h3>
    </div>

</body>
</html>
