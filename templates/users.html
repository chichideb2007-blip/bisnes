<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأعمال</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen">

    <nav class="bg-amber-900 text-stone-100 p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">نظام إدارة الأعمال</h1>
            <a href="/logout" class="text-stone-300 hover:text-white transition">خروج</a>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8">
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 mb-8">
            <h2 class="text-lg font-bold mb-4 text-stone-700">إضافة طلب جديد</h2>
            <form action="/add_data" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" name="order_name" placeholder="أدخل اسم الطلب..." 
                    class="p-3 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition" required>
                <button type="submit" 
                    class="bg-amber-800 text-stone-100 py-3 rounded-xl hover:bg-amber-900 transition">
                    حفظ الطلب
                </button>
            </form>
        </section>

        <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-x-auto">
            <table class="w-full text-right border-collapse">
                <thead class="bg-stone-100">
                    <tr>
                        <th class="py-4 px-6 font-semibold text-stone-700">اسم الطلب</th>
                        <th class="py-4 px-6 font-semibold text-stone-700">التاريخ</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-stone-100">
                    {% for item in users %}
                    <tr class="hover:bg-stone-50 transition">
                        <td class="py-4 px-6 flex items-center gap-3">
                            <span class="text-amber-700">●</span>
                            <span class="text-stone-800">{{ item.order_name }}</span>
                        </td>
                        <td class="py-4 px-6 text-stone-500">اليوم</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
