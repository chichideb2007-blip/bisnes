<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
</head>
<body>
    <h1>مرحباً بك في لوحة التحكم</h1>

    <!-- نموذج إضافة منتج جديد -->
    <form action="/add" method="POST">
        <h3>إضافة طلب جديد</h3>
        <input type="text" name="product_name" placeholder="اسم المنتج" required>
        <input type="number" step="0.01" name="total_price" placeholder="السعر (total_price)" required>
        <button type="submit">إضافة</button>
    </form>

    <hr>

    <!-- عرض إجمالي المبيعات -->
    <h3>مجموع المبيعات: {{ total }} دج</h3>

    <!-- جدول الطلبات -->
    <table border="1">
        <thead>
            <tr>
                <th>اسم المنتج</th>
                <th>السعر</th>
                <th>إجراءات</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.price_display }}</td>

                <td>{{ order.price_display }}</td>

                <td><a href="/delete/{{ order.id }}">حذف</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
