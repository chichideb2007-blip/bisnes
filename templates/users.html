<div style="direction: rtl; text-align: right; padding: 20px;">
    <h2>لوحة التحكم</h2>
    <h3>مجموع مبيعات اليوم: {{ total }} دج</h3>

    <!-- خانة الإضافة -->
    <form action="/add" method="POST">
        <input type="text" name="product_name" placeholder="اسم المنتج" required>
        <input type="number" name="price" placeholder="السعر" required>
        <button type="submit">إضافة طلب</button>
    </form>

    <hr>

    <!-- جدول الطلبات مع أزرار الحذف -->
    <table border="1" width="100%">
        <tr>
            <th>المنتج</th>
            <th>السعر</th>
            <th>إجراءات</th>
        </tr>
        {% for order in orders %}
        <tr>
            <td>{{ order.product_name }}</td>
            <td>{{ order.price }}</td>
            <td>
                <a href="/delete/{{ order.id }}">حذف</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
