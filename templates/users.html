<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة الأعمال</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-stone-200">
        <h2 class="text-2xl font-bold text-stone-800 text-center mb-6">مرحباً بك مجدداً</h2>
        
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-stone-600 mb-1">اسم المستخدم</label>
                <input type="text" name="username" required 
                    class="w-full px-4 py-2 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-stone-600 mb-1">كلمة السر</label>
                <input type="password" name="password" required 
                    class="w-full px-4 py-2 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition">
            </div>

            <button type="submit" 
                class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-xl transition duration-300 shadow-lg">
                دخول
            </button>
        </form>
    </div>

</body>
</html>
