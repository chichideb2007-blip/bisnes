<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .navbar { background-color: #f4f4f4; padding: 15px; text-align: left; margin-bottom: 20px; border-radius: 5px; }
        .navbar a { margin-right: 15px; text-decoration: none; color: blue; font-weight: bold; }
        .navbar a.logout { color: red; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f2f2f2; }
        .form-container { margin-bottom: 30px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/stats">عرض الإحصائيات</a>
        <a href="/logout" class="logout">تسجيل الخروج</a>
    </div>

    <h1>لوحة تحكم الطلبات</h1>

    <div class="form-container">
        <h3>إضافة طلب جديد</h3>
        <form action="/add" method="POST">
            <input type="text" name="customer_name" placeholder="اسم الزبون" required>
            <input type="text" name="product_name" placeholder="المنتج" required>
            <input type="number" name="total_price" placeholder="السعر" required>
            <button type="submit">إضافة</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>اسم الزبون</th>
                <th>المنتج</th>
                <th>السعر</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody>
            {% for item in orders %}
            <tr>
                <td>{{ item.customer_name }}</td>
                <td>{{ item.product_name }}</td>
                <td>{{ item.total_price }}</td>
                <td><a href="/delete/{{ item.id }}" style="color: red;">حذف</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <br>
    <h3>إجمالي الأرباح الحالية: {{ total }} دج</h3>

</body>
</html>
