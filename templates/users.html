<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة زبون جديد</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f4; }
        form { background: white; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { background-color: #4CAF50; color: white; padding: 10px; border: none; width: 100%; }
    </style>
</head>
<body>
    <h2>إضافة زبون جديد</h2>
    <form action="/add" method="GET">
        <input type="text" name="username" placeholder="اسم الزبون" required>
        <button type="submit">حفظ البيانات</button>
    </form>
    <br>
    <a href="/users">عرض قائمة الزبائن</a>
</body>
</html>
