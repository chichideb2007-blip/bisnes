<div id="google_translate_element"></div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ar',
            includedLanguages: 'ar,en,fr,es', // حددي اللغات المهمة فقط
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<!-- سكربت إضافي لإجبار المتصفح على الاحتفاظ باللغة -->
<script>
    // عند تغيير اللغة، يتم حفظها في ذاكرة المتصفح
    document.addEventListener('DOMContentLoaded', function() {
        var select = document.querySelector('.goog-te-combo');
        if (select) {
            select.addEventListener('change', function() {
                localStorage.setItem('userLanguage', select.value);
            });
        }
        
        // عند تحميل أي صفحة، نقوم بتطبيق اللغة المحفوظة
        var savedLang = localStorage.getItem('userLanguage');
        if (savedLang) {
            var select = document.querySelector('.goog-te-combo');
            if (select) {
                select.value = savedLang;
                select.dispatchEvent(new Event('change'));
            }
        }
    });
</script>
