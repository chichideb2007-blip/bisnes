<div id="google_translate_element"></div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ar',
            includedLanguages: 'ar,en,fr,es,de,it,ru,tr,ja,zh-CN,pt', 
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
    // هذا الجزء هو المسؤول عن تذكر اللغة عند الانتقال بين الصفحات
    window.addEventListener('load', function() {
        var lang = localStorage.getItem('googtrans');
        if (lang) {
            // المحاولة لفرض اللغة المحفوظة
            setTimeout(function() {
                var select = document.querySelector('.goog-te-combo');
                if (select) {
                    select.value = lang.split('/')[2];
                    select.dispatchEvent(new Event('change'));
                }
            }, 1000);
        }
    });

    // حفظ اللغة عند التغيير
    document.addEventListener('change', function(e) {
        if (e.target.className === 'goog-te-combo') {
            localStorage.setItem('googtrans', '/auto/' + e.target.value);
        }
    });
</script>
