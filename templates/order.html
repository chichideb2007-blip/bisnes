<form action="/submit-order" method="POST">
    <input type="hidden" name="product_id" value="{{ product.id }}">
    
    <input type="text" name="customer_name" placeholder="الاسم" required class="form-control mb-2">
    <input type="text" name="phone" placeholder="الهاتف" required class="form-control mb-2">

    <label>اختر الولاية:</label>
    <select id="wilaya" name="wilaya" onchange="calculateShipping()" class="form-control mb-2" required>
        <option value="">-- اختر الولاية --</option>
        {% for rate in rates %}
            <option value="{{ rate.id }}" 
                    data-office="{{ rate.office_price }}" 
                    data-home="{{ rate.home_price }}">
                {{ rate.wilaya }}
            </option>
        {% endfor %}
    </select>

    <label>طريقة التوصيل:</label>
    <select id="delivery_type" name="delivery_type" onchange="calculateShipping()" class="form-control mb-2" required>
        <option value="office">توصيل للمكتب</option>
        <option value="home">توصيل للمنزل</option>
    </select>

    <h4 class="mt-3">سعر التوصيل: <span id="price-display">0</span> دج</h4>
    
    <button type="submit" class="btn btn-primary w-100">تأكيد الطلب</button>
</form>

<script>
function calculateShipping() {
    let wilayaSelect = document.getElementById('wilaya');
    let typeSelect = document.getElementById('delivery_type').value;
    let priceDisplay = document.getElementById('price-display');
    
    let selectedOption = wilayaSelect.options[wilayaSelect.selectedIndex];
    
    if(wilayaSelect.value !== "") {
        let price = (typeSelect === 'home') ? selectedOption.dataset.home : selectedOption.dataset.office;
        priceDisplay.innerText = price;
    } else {
        priceDisplay.innerText = "0";
    }
}
</script>
