<form action="/submit-order" method="POST" class="p-3 border rounded">
    <!-- الحقول المخفية الضرورية -->
    <input type="hidden" name="product_id" value="{{ product.id }}">
    <input type="hidden" id="base_price" value="{{ product.price }}">
    <input type="hidden" id="company_code" value="{{ product.company_id_text }}">

    <div class="mb-3">
        <input type="text" name="customer_name" placeholder="الاسم" required class="form-control mb-2">
        <input type="text" name="customer_last_name" placeholder="اللقب" required class="form-control mb-2">
        <input type="text" name="phone" placeholder="رقم الهاتف" required class="form-control mb-2">
    </div>

    <div class="mb-3">
        <label>اختر الولاية:</label>
        <!-- قمنا بتغيير الدالة المستدعاة إلى calculateDelivery -->
        <select id="wilaya" name="wilaya" onchange="calculateDelivery()" class="form-control mb-2" required>
            <option value="">-- اختر الولاية --</option>
            {% for rate in rates %}
                <option value="{{ rate.id }}">{{ rate.wilaya_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>طريقة التوصيل:</label>
        <!-- قمنا بتغيير الدالة المستدعاة إلى calculateDelivery -->
        <select id="delivery_type" name="delivery_type" onchange="calculateDelivery()" class="form-control mb-2" required>
            <option value="home">توصيل للمنزل</option>
            <option value="office">توصيل للمكتب</option>
        </select>
    </div>

    <div class="card p-3 bg-light">
        <h4>سعر التوصيل: <span id="shipping_display">0</span> دج</h4>
        <h4 class="text-primary">الإجمالي الكلي: <span id="total_display">{{ product.price }}</span> دج</h4>
    </div>
    
    <div class="mt-3 d-flex gap-2">
        <button type="submit" class="btn btn-success flex-grow-1">تأكيد الطلب</button>
        <a href="/shop" class="btn btn-secondary">رجوع</a>
    </div>
</form>
<script>
function calculateDelivery() {
    // 1. جلب القيم من الصفحة
    const companyCode = document.getElementById('company_code').value;
    const stateId = document.getElementById('wilaya').value;
    const type = document.getElementById('delivery_type').value;
    const basePrice = parseFloat(document.getElementById('base_price').value) || 0;
    
    const shippingDisplay = document.getElementById('shipping_display');
    const totalDisplay = document.getElementById('total_display');

    // 2. التحقق من اختيار الولاية
    if (!stateId || stateId === "") {
        shippingDisplay.innerText = "0";
        totalDisplay.innerText = basePrice;
        return;
    }

    // 3. جلب السعر من المسار الذي برمجناه في main.py
    // لاحظ أننا نرسل الكود والنوع والولاية
    fetch(`/get_delivery_price?company_code=${companyCode}&state_id=${stateId}&type=${type}`)
    .then(response => response.json())
    .then(data => {
        const deliveryPrice = parseFloat(data.price) || 0;
        const total = basePrice + deliveryPrice;

        // 4. تحديث الشاشة
        shippingDisplay.innerText = deliveryPrice;
        totalDisplay.innerText = total;
    })
    .catch(error => {
        console.error('Error fetching price:', error);
        shippingDisplay.innerText = "خطأ";
    });
}
</script>
