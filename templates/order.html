<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طلب المنتج: {{ product.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 500px;">
        <div class="card p-4 shadow">
            <form action="/submit-order" method="POST">
                <input type="hidden" name="product_id" value="{{ product.id }}">
                
                <h2 class="mb-3 text-center">طلب المنتج: {{ product.name }}</h2>
                <p class="text-center text-muted">السعر: {{ product.price }} {{ currency }}</p>

                <div class="mb-3">
                    <input type="text" name="customer_name" class="form-control" placeholder="اسمك الكامل" required>
                </div>
                <div class="mb-3">
                    <input type="tel" name="phone" class="form-control" placeholder="رقم الهاتف" required>
                </div>

                <div class="mb-3">
                    <select name="wilaya" id="wilaya-select" class="form-select" onchange="loadCommunes()" required>
                        <option value="">اختر الولاية</option>
                        <!-- يمكنك ملء الولايات هنا -->
                    </select>
                </div>
                
                <div class="mb-3">
                    <select name="commune" id="commune-select" class="form-select" required>
                        <option value="">اختر البلدية</option>
                    </select>
                </div>

                <div class="mb-3">
                    <select name="delivery_type" class="form-select" required>
                        <option value="home">توصيل للمنزل</option>
                        <option value="office">توصيل للمكتب</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <script>
        function loadCommunes() {
            // هنا تضع منطق جلب البلديات بناءً على الولاية المختارة
            console.log("جارٍ تحميل البلديات...");
        }
    </script>
</body>
</html>
