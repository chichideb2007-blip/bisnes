<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات التوصيل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 800px;">
        <h2 class="mb-4">تعديل أسعار التوصيل</h2>
        <div class="card p-4 shadow">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>الولاية</th>
                        <th>سعر المكتب (دج)</th>
                        <th>سعر المنزل (دج)</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody>
                    {% for rate in rates %}
                    <!-- كل سطر عبارة عن فورم مستقل للحفظ -->
                    <form action="/shipping_settings" method="POST">
                        <tr>
                            <td>{{ rate.wilaya }}</td>
                            <td><input type="number" name="office_price" class="form-control" value="{{ rate.office_price }}"></td>
                            <td><input type="number" name="home_price" class="form-control" value="{{ rate.home_price }}"></td>
                            <td>
                                <input type="hidden" name="id" value="{{ rate.id }}">
                                <button type="submit" class="btn btn-sm btn-success">حفظ</button>
                            </td>
                        </tr>
                    </form>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
