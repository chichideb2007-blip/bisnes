<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <style>
        /* القيم الافتراضية */
        :root {
            --primary-color: #28a745;
            --bg-color: #f4f4f9;
        }
        body { background-color: var(--bg-color); transition: background 0.3s; }
        
        /* تطبيق الألوان على العناصر الرئيسية */
        button, h1, h2, h3, th { background-color: var(--primary-color) !important; color: white !important; }
        .container { background: white; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // هذا السكريبت سيطبق الألوان المحفوظة بمجرد فتح أي صفحة
        window.onload = () => {
            const p = localStorage.getItem('primaryColor');
            const b = localStorage.getItem('bgColor');
            
            if(b) document.documentElement.style.setProperty('--bg-color', b);
            if(p) {
                document.documentElement.style.setProperty('--primary-color', p);
                // تطبيق اللون على الأزرار والعناوين فوراً
                document.querySelectorAll('button, h1, h2, h3, th').forEach(el => {
                    el.style.backgroundColor = p;
                });
            }
        };
    </script>
</body>
</html>
