<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>إعدادات الحساب</title>
    <style>
        .card { border-radius: 15px; }
        .form-label { font-weight: bold; }
        .section-title { color: #0d6efd; border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-4">
        <!-- أزرار التحكم العلوية -->
        <div class="d-flex justify-content-between mb-4">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">⬅️ رجوع للوحة التحكم</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">🚪 خروج</a>
        </div>

        <h2 class="text-center mb-4">⚙️ إعدادات الحساب العامة</h2>
        
        <div class="card p-4 shadow-sm">
            <form action="{{ url_for('settings') }}" method="POST">
                
                <!-- قسم المتجر -->
                <h5 class="section-title">🏠 معلومات المتجر</h5>
                <div class="mb-3">
                    <label class="form-label">اسم المتجر</label>
                    <input type="text" name="shop_name" class="form-control" value="{{ settings.shop_name or '' }}">
                </div>
                
                <!-- قسم البوت المحدث -->
                <h5 class="section-title mt-4">🤖 إعدادات البوت</h5>
                
                <!-- حقل معرف البوت -->
                <div class="mb-3">
                    <label class="form-label">معرف البوت (Bot Token)</label>
                    <input type="text" name="bot_token" class="form-control" placeholder="أدخل توكن البوت هنا" value="{{ settings.telegram_token or '' }}">
                    <small class="text-muted">هذا المعرف يستخدم لربط البوت الخاص بك.</small>
                </div>

                <!-- حقل معرف المحادثة (Chat ID) المضاف -->
                <div class="mb-3">
                    <label class="form-label">معرف المحادثة (Chat ID)</label>
                    <input type="text" name="chat_id" class="form-control" placeholder="أدخل معرف الشات ID هنا" value="{{ settings.telegram_chat_id or '' }}">
                    <small class="text-muted">هذا المعرف يستخدم لإرسال التنبيهات إلى حسابك.</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">اسم البوت</label>
                    <input type="text" name="bot_name" class="form-control" value="{{ settings.bot_name or '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">رابط حساب انستقرام</label>
                    <input type="url" name="instagram_link" class="form-control" value="{{ settings.instagram_link or '' }}">
                </div>

                <!-- قسم العملات -->
                <h5 class="section-title mt-4">💰 إعدادات العملة</h5>
                <div class="mb-3">
                    <label class="form-label">البحث عن عملة</label>
                    <input type="text" id="currencySearch" class="form-control mb-2" placeholder="🔍 اكتب اسم العملة للبحث (مثلاً: دينار)...">
                    
                    <label class="form-label">قائمة العملات العالمية</label>
                    <select name="currency" id="currencySelect" class="form-select" size="5">
                        {% for code, name in currencies %}
                            <option value="{{ code }}" {% if settings.currency == code %}selected{% endif %}>
                                {{ code }} - {{ name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- زر الحفظ -->
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">💾 حفظ كافة المعلومات</button>
            </form>
        </div>
    </div>

    <script>
        // سكربت البحث في القائمة
        document.getElementById('currencySearch').addEventListener('keyup', function() {
            let input = this.value.toLowerCase();
            let options = document.getElementById('currencySelect').options;
            for (let i = 0; i < options.length; i++) {
                let txtValue = options[i].textContent.toLowerCase();
                options[i].style.display = txtValue.indexOf(input) > -1 ? "" : "none";
            }
        });
    </script>
</body>
</html>
