<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>الإعدادات</title>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="mb-4 text-center">⚙️ إعدادات الحساب</h2>
        
        <div class="card p-4 shadow-sm">
            <!-- نموذج معلومات المتجر والعملة -->
            <form action="{{ url_for('settings') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">اسم المتجر</label>
                    <input type="text" name="company_name" class="form-control" value="{{ settings.company_name or '' }}" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">توكن تليجرام</label>
                        <input type="text" name="telegram_token" class="form-control" value="{{ settings.telegram_token or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">رقم تعريف المحادثة (Chat ID)</label>
                        <input type="text" name="chat_id" class="form-control" value="{{ settings.telegram_chat_id or '' }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">رابط إنستقرام</label>
                    <input type="text" name="instagram_url" class="form-control" value="{{ settings.instagram_url or '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">العملة الافتراضية</label>
                    <select name="currency" class="form-select">
                        <!-- عملات مغاربية وعربية -->
                        <option value="DZD" {% if settings.currency == 'DZD' %}selected{% endif %}>دج (DZD) - الجزائر</option>
                        <option value="TND" {% if settings.currency == 'TND' %}selected{% endif %}>دينار (TND) - تونس</option>
                        <option value="MAD" {% if settings.currency == 'MAD' %}selected{% endif %}>درهم (MAD) - المغرب</option>
                        <option value="SAR" {% if settings.currency == 'SAR' %}selected{% endif %}>ريال (SAR) - السعودية</option>
                        <option value="AED" {% if settings.currency == 'AED' %}selected{% endif %}>درهم (AED) - الإمارات</option>
                        <option value="EGP" {% if settings.currency == 'EGP' %}selected{% endif %}>جنيه (EGP) - مصر</option>
                        <option value="QAR" {% if settings.currency == 'QAR' %}selected{% endif %}>ريال (QAR) - قطر</option>
                        <option value="KWD" {% if settings.currency == 'KWD' %}selected{% endif %}>دينار (KWD) - الكويت</option>
                        
                        <!-- عملات عالمية -->
                        <option value="USD" {% if settings.currency == 'USD' %}selected{% endif %}>دولار ($) - أمريكي</option>
                        <option value="EUR" {% if settings.currency == 'EUR' %}selected{% endif %}>يورو (€) - أوروبي</option>
                        <option value="GBP" {% if settings.currency == 'GBP' %}selected{% endif %}>جنيه إسترليني (£) - بريطاني</option>
                        <option value="CAD" {% if settings.currency == 'CAD' %}selected{% endif %}>دولار (CAD) - كندي</option>
                        <option value="AUD" {% if settings.currency == 'AUD' %}selected{% endif %}>دولار (AUD) - أسترالي</option>
                        <option value="JPY" {% if settings.currency == 'JPY' %}selected{% endif %}>ين (¥) - ياباني</option>
                        <option value="TRY" {% if settings.currency == 'TRY' %}selected{% endif %}>ليرة (TRY) - تركية</option>
                        <option value="CHF" {% if settings.currency == 'CHF' %}selected{% endif %}>فرنك (CHF) - سويسري</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">حفظ معلومات المتجر والعملة</button>
            </form>

            <hr class="my-4">

            <!-- نموذج اللون -->
            <form action="{{ url_for('settings') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">لون واجهة المتجر</label>
                    <input type="color" name="theme_color" class="form-control form-control-color w-100" value="{{ settings.theme_color or '#0d6efd' }}">
                </div>
                <button type="submit" class="btn btn-success w-100">حفظ اللون</button>
            </form>

            <hr class="my-4">

            <!-- ربط إنستقرام -->
            <div class="mb-3 text-center">
                <label class="form-label d-block">ربط حساب إنستقرام</label>
                <a href="{{ url_for('instagram_login') if 'instagram_login' in url_for.__globals__ else '#' }}" class="btn btn-info text-white w-100">
                    اضغط هنا لربط حساب إنستقرام
                </a>
            </div>
            
            <div class="mt-3 text-center">
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary px-4">العودة للوحة التحكم</a>
            </div>
        </div>
    </div>

</body>
</html>
