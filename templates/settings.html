<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إعدادات النظام</title>
</head>
<body>
    <h2>إعدادات استقبال الطلبات</h2>
    <form action="/save-settings" method="POST">
        <input type="text" name="smtp_server" placeholder="SMTP Server" required>
        <input type="number" name="smtp_port" placeholder="Port (e.g. 587)" required>
        <input type="email" name="email_address" placeholder="إيميلك الشخصي" required>
        <input type="password" name="email_password" placeholder="App Password" required>
        
        <hr>
        
        <input type="text" name="instagram_token" placeholder="أدخل Access Token للإنستغرام">
        
        <button type="submit">حفظ الإعدادات</button>
    </form>
    
    <br>
    <a href="/dashboard">العودة للوحة التحكم</a>
</body>
</html>
