<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>إعدادات الحساب</title>
</head>
<body class="bg-light">

    <!-- شريط الأدوات العلوي الموحد -->
    <div class="container mt-3">
        <div class="d-flex justify-content-between align-items-center">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">⬅️ لوحة التحكم</a>
            
            <!-- المحرك الذي يجعل الصفحة قابلة للترجمة التلقائية لكل لغات العالم -->
            <div id="google_translate_element"></div>
            
            <a href="{{ url_for('logout') }}" class="btn btn-danger">🚪 خروج</a>
        </div>
    </div>

    <!-- سكربت تهيئة الترجمة -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ar',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>

    <div class="container mt-4">
        <h2 class="mb-4 text-center">⚙️ إعدادات الحساب</h2>
        
        <div class="card p-4 shadow-sm">
            <form action="{{ url_for('settings') }}" method="POST">
                
                <div class="mb-3">
                    <label class="form-label">اسم المتجر</label>
                    <input type="text" name="company_name" class="form-control" value="{{ settings.company_name or '' }}" required>
                </div>

                <!-- خانة البحث في العملات لكل عملات العالم -->
                <div class="mb-3">
                    <label class="form-label">العملة الافتراضية</label>
                    <input type="text" id="currencySearch" class="form-control mb-2" placeholder="🔍 ابحث عن أي عملة في العالم...">
                    
                    <select name="currency" id="currencySelect" class="form-select">
                        {% for code, name in currencies %}
                            <option value="{{ code }}" {% if settings.currency == code %}selected{% endif %}>
                                {{ code }} - {{ name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">💾 حفظ كافة المعلومات</button>
            </form>
        </div>
    </div>

    <!-- سكربت البحث في العملات -->
    <script type="text/javascript">
        document.getElementById('currencySearch').addEventListener('input', function() {
            let filter = this.value.toUpperCase();
            let options = document.getElementById('currencySelect').options;
            for (let i = 0; i < options.length; i++) {
                options[i].style.display = (options[i].text.toUpperCase().includes(filter)) ? "" : "none";
            }
        });
    </script>
</body>
</html>
