<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>الإعدادات</title>
    
    <!-- سكربت ترجمة جوجل -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body class="bg-light">

    <!-- قائمة اختيار اللغات في أعلى الصفحة -->
    <div class="container mt-3 text-center">
        <div id="google_translate_element"></div>
    </div>

    <div class="container mt-4">
        <!-- شريط التنقل العلوي -->
        <div class="d-flex justify-content-between mb-4">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">⬅️ لوحة التحكم</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">🚪 خروج</a>
        </div>

        <h2 class="mb-4 text-center">⚙️ إعدادات الحساب</h2>
        
        <div class="card p-4 shadow-sm">
            <!-- نموذج معلومات المتجر والعملة -->
            <form action="{{ url_for('settings') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">اسم المتجر</label>
                    <input type="text" name="company_name" class="form-control" value="{{ settings.company_name or '' }}" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">توكن تليجرام</label>
                        <input type="text" name="telegram_token" class="form-control" value="{{ settings.telegram_token or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">رقم تعريف المحادثة (Chat ID)</label>
                        <input type="text" name="chat_id" class="form-control" value="{{ settings.telegram_chat_id or '' }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">رابط إنستقرام</label>
                    <input type="text" name="instagram_url" class="form-control" value="{{ settings.instagram_url or '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">العملة الافتراضية</label>
                    <!-- خانة البحث عن العملة -->
                    <input type="text" id="currencySearch" class="form-control mb-2" placeholder="🔍 ابحث عن العملة...">
                    
                    <select name="currency" id="currencySelect" class="form-select">
                        {% for code, name in currencies %}
                            <option value="{{ code }}" {% if settings.currency == code %}selected{% endif %}>
                                {{ code }} - {{ name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">💾 حفظ كافة المعلومات</button>
            </form>
        </div>
    </div>

    <!-- السكربتات -->
    <script type="text/javascript">
        // سكربت ترجمة جوجل
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element');
        }

        // سكربت البحث في القائمة
        document.getElementById('currencySearch').addEventListener('input', function() {
            let filter = this.value.toUpperCase();
            let select = document.getElementById('currencySelect');
            let options = select.getElementsByTagName('option');
            
            for (let i = 0; i < options.length; i++) {
                let txtValue = options[i].textContent || options[i].innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    options[i].style.display = "";
                } else {
                    options[i].style.display = "none";
                }
            }
        });
    </script>
</body>
</html>
