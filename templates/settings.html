<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>إعدادات المتجر والبوت</h2>
    
    <form action="/update_settings" method="POST">
        <label>اسم المتجر:</label>
        <input type="text" name="store_name" placeholder="أدخل اسم متجرك">
        
        <label>توكن بوت تلجرام:</label>
        <input type="text" name="telegram_token" placeholder="أدخل التوكن الخاص بك">
        
        <label>لون واجهة لوحة التحكم:</label>
        <input type="color" name="theme_color" id="color-picker">
        
        <button type="submit">حفظ كافة الإعدادات</button>
    </form>

    <br>
    <a href="/dashboard">رجوع للوحة التحكم</a>
</body>
</html>
