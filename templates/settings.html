<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات المتجر</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; transition: background-color 0.3s; }
        .container { max-width: 500px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 10px; background: white; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { padding: 10px 20px; border: none; cursor: pointer; color: white; margin-top: 10px; }
        .save-btn { background-color: #28a745; width: 100%; }
        .logout-btn { background-color: #dc3545; width: 100%; }
    </style>
</head>
<body id="body-bg">

    <div class="container">
        <h1>إعدادات المتجر</h1>
        <form action="/settings" method="POST">
            <label>اسم المتجر أو البوت:</label>
            <input type="text" name="store_name" placeholder="مثال: متجر شيماء">

            <label>توكن تلجرام (Telegram Token):</label>
            <input type="text" name="telegram_token" placeholder="ضعي التوكن هنا">

            <label>تغيير لون خلفية الموقع:</label>
            <input type="color" id="colorPicker" name="theme_color" onchange="changeColor()">
            
            <button type="submit" class="save-btn">حفظ المعلومات والألوان</button>
        </form>

        <hr>
        <a href="{{ url_for('dashboard') }}">الرجوع للوحة التحكم</a>
        <br><br>
        <form action="{{ url_for('logout') }}">
            <button type="submit" class="logout-btn">تسجيل الخروج</button>
        </form>
    </div>

    <script>
        function changeColor() {
            const color = document.getElementById('colorPicker').value;
            document.getElementById('body-bg').style.backgroundColor = color;
        }
    </script>
</body>
</html>
