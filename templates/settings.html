<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات المنصة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f9; padding: 20px; transition: background 0.3s; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        h2 { text-align: center; grid-column: span 2; color: #333; }
        .section-box { border: 1px solid #ddd; padding: 20px; border-radius: 10px; background: #fff; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button, .btn-link { padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; text-align: center; text-decoration: none; transition: 0.3s; }
        .btn-telegram { background-color: #0088cc; } /* لون تيلجرام */
        .btn-save-color { background-color: #17a2b8; }
        .btn-back { background-color: #6c757d; }
        .btn-logout { background-color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ إعدادات المنصة الشاملة</h2>
    
    <div class="settings-grid">
        <div class="section-box">
            <h3>إعدادات تيلجرام والمتجر</h3>
            <form action="/update_settings" method="POST">
                <label>اسم المتجر:</label>
                <input type="text" name="store_name" placeholder="أدخلي اسم المتجر" required>

                <label>توكن البوت (API Token):</label>
                <input type="text" name="token" placeholder="أدخل التوكن من BotFather" required>
                
                <label>رقم التعريف (Chat ID):</label>
                <input type="text" name="phone" placeholder="أدخل الـ Chat ID الخاص بك" required>
                
                <button type="submit" class="btn-telegram">حفظ إعدادات تيلجرام</button>
            </form>
        </div>

        <div class="section-box">
            <h3>تخصيص المظهر</h3>
            <label>لون خلفية الصفحة:</label>
            <input type="color" id="bgColorPicker">
            
            <div class="btn-group">
                <button onclick="saveBgColor()" class="btn-save-color">حفظ وتطبيق اللون</button>
                <a href="{{ url_for('dashboard') }}" class="btn-link btn-back">العودة للوحة التحكم</a>
                <a href="{{ url_for('logout') }}" class="btn-link btn-logout">تسجيل خروج</a>
            </div>
        </div>
    </div>
</div>

<script>
    function saveBgColor() {
        const bg = document.getElementById('bgColorPicker').value;
        localStorage.setItem('settingsBgColor', bg);
        document.body.style.backgroundColor = bg;
        alert("تم حفظ لون الخلفية!");
    }
    window.onload = () => {
        const savedBg = localStorage.getItem('settingsBgColor');
        if(savedBg) {
            document.body.style.backgroundColor = savedBg;
            document.getElementById('bgColorPicker').value = savedBg;
        }
    };
</script>

</body>
</html>
