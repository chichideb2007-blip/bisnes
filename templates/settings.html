<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات الموقع</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-direction: column; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-save { background-color: #28a745; }
        .btn-color { background-color: #007bff; }
        .btn-logout { background-color: #dc3545; }
        a { text-decoration: none; color: white; display: block; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ إعدادات الموقع</h2>
    
    <form action="/settings" method="POST">
        <label>اسم المتجر أو البوت:</label>
        <input type="text" name="store_name" placeholder="أدخلي اسم المتجر هنا">

        <label>رابط أو توكن تلجرام:</label>
        <input type="text" name="telegram_token" placeholder="أدخلي التوكن هنا">

        <div class="btn-group">
            <button type="submit" class="btn-save">حفظ المعلومات</button>
        </div>
    </form>

    <hr>

    <label>اختيار لون الموقع:</label>
    <input type="color" id="colorPicker">
    <div class="btn-group">
        <button onclick="saveColor()" class="btn-color">حفظ الألوان</button>
    </div>

    <hr>

    <div class="btn-group">
        <button class="btn-logout">
            <a href="{{ url_for('logout') }}">تسجيل الخروج</a>
        </button>
    </div>

    <br>
    <a href="{{ url_for('dashboard') }}" style="color: #666;">الرجوع للوحة التحكم</a>
</div>

<script>
    function saveColor() {
        const color = document.getElementById('colorPicker').value;
        alert("تم حفظ اللون: " + color);
        // يمكنك لاحقاً إضافة كود هنا لإرسال اللون لقاعدة البيانات
    }
</script>

</body>
</html>
