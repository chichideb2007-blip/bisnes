<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات المتجر</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 30px; }
        .box { max-width: 500px; background: white; padding: 20px; border-radius: 10px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .nav { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>⚙️ إعدادات المتجر</h2>
        <form method="POST">
            <label>اسم المتجر:</label>
            <input type="text" name="shop_name" value="{{ settings.shop_name or '' }}" required>
            
            <label>توكين البوت (Bot Token):</label>
            <input type="text" name="bot_token" value="{{ settings.bot_token or '' }}" required>
            
            <label>رقم معرف تليجرام (Chat ID):</label>
            <input type="text" name="telegram_chat_id" value="{{ settings.telegram_chat_id or '' }}" required>
            
            <button type="submit">حفظ الإعدادات</button>
        </form>
        <div class="nav"><a href="/dashboard">العودة للوحة التحكم</a></div>
    </div>
</body>
</html>
