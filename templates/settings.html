<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>إعدادات الحساب</title>
    <!-- سكربت ترجمة جوجل -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        .card { border-radius: 15px; }
        .form-label { font-weight: bold; }
    </style>
</head>
<body class="bg-light">

    <!-- شريط الأدوات العلوي -->
    <div class="container mt-3">
        <div class="d-flex justify-content-between align-items-center">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">⬅️ لوحة التحكم</a>
            <div id="google_translate_element"></div>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">🚪 خروج</a>
        </div>
    </div>

    <div class="container mt-4">
        <h2 class="text-center mb-4">⚙️ إعدادات الحساب العامة</h2>
        
        <div class="card p-4 shadow-sm">
            <form action="{{ url_for('settings') }}" method="POST">
                
                <div class="row">
                    <!-- اسم المتجر و الـ ID -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">اسم المتجر / البوت</label>
                        <input type="text" name="company_name" class="form-control" value="{{ settings.company_name or '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">معرف الشركة (ID)</label>
                        <input type="text" name="company_id" class="form-control" value="{{ settings.company_id or '' }}" readonly>
                    </div>
                </div>

                <!-- رابط انستقرام -->
                <div class="mb-3">
                    <label class="form-label">رابط حساب انستقرام</label>
                    <input type="url" name="instagram_link" class="form-control" placeholder="https://instagram.com/your-account" value="{{ settings.instagram_link or '' }}">
                </div>

                <!-- اختيار العملة مع البحث -->
                <div class="mb-3">
                    <label class="form-label">العملة الافتراضية</label>
                    <input type="text" id="currencySearch" class="form-control mb-2" placeholder="🔍 ابحث عن أي عملة في العالم...">
                    <select name="currency" id="currencySelect" class="form-select">
                        {% for code, name in currencies %}
                            <option value="{{ code }}" {% if settings.currency == code %}selected{% endif %}>
                                {{ code }} - {{ name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- اختيار اللون -->
                <div class="mb-3">
                    <label class="form-label">لون واجهة المتجر</label>
                    <input type="color" name="theme_color" class="form-control form-control-color w-100" value="{{ settings.theme_color or '#0d6efd' }}">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">💾 حفظ كافة المعلومات</button>
            </form>
        </div>
    </div>

    <script type="text/javascript">
        // ترجمة جوجل
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        // بحث العملات
        document.getElementById('currencySearch').addEventListener('input', function() {
            let filter = this.value.toUpperCase();
            let options = document.getElementById('currencySelect').options;
            for (let i = 0; i < options.length; i++) {
                options[i].style.display = (options[i].text.toUpperCase().includes(filter)) ? "" : "none";
            }
        });
    </script>
</body>
</html>
