<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات المتجر</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <div class="container" style="max-width: 600px;">
        <h2 class="mb-4">⚙️ إعدادات المتجر</h2>
        <form method="POST">
            <div class="mb-3">
                <label>اسم المتجر</label>
                <input type="text" name="company_name" class="form-control" value="{{ settings.company_name or '' }}">
            </div>
            <div class="mb-3">
                <label>توكن بوت تليجرام</label>
                <input type="text" name="telegram_token" class="form-control" value="{{ settings.telegram_token or '' }}">
            </div>
            <div class="mb-3">
                <label>رقم تعريف المحادثة (Chat ID)</label>
                <input type="text" name="telegram_chat_id" class="form-control" value="{{ settings.telegram_chat_id or '' }}">
            </div>
            <div class="mb-3">
                <label>لون واجهة المتجر</label>
                <input type="color" name="theme_color" class="form-control form-control-color" value="{{ settings.theme_color or '#0d6efd' }}">
            </div>
            <button type="submit" class="btn btn-primary">حفظ المعلومات</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">رجوع للوحة التحكم</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">تسجيل خروج</a>
        </form>
    </div>
</body>
</html>
