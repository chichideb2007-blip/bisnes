<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إحصائيات المبيعات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .nav-links { margin-bottom: 20px; }
        .nav-links a { margin: 0 10px; text-decoration: none; color: blue; }
        .logout { color: red !important; }
    </style>
</head>
<body>
    <h2>إحصائيات مبيعاتك</h2>
    
    <div class="nav-links">
        <a href="/dashboard">العودة للوحة التحكم</a> | 
        <a href="/logout" class="logout">تسجيل الخروج</a>
    </div>

    <div style="width: 80%; margin: auto;">
        <canvas id="salesChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('salesChart').getContext('2d');
        const salesChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: {{ labels | tojson }},
                datasets: [{
                    label: 'السعر بالدينار',
                    data: {{ values | tojson }},
                    backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            }
        });
    </script>
</body>
</html>
