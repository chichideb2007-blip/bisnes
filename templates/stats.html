<script>
    // 1. منحنى الأيام (من السبت إلى الجمعة)
    new Chart(document.getElementById('daysChart'), {
        type: 'line',
        data: {
            labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'],
            datasets: [{
                label: 'مبيعات الأيام',
                data: [0, 0, 0, 0, 0, 0, {{ daily_total }}], // سيتم استبدال الأصفار بالبيانات لاحقاً
                borderColor: '#007bff',
                fill: false
            }]
        }
    });

    // 2. منحنى الأشهر (من جانفي إلى ديسمبر)
    new Chart(document.getElementById('monthsChart'), {
        type: 'line',
        data: {
            labels: ['جانفي', 'فيفري', 'مارس', 'أفريل', 'ماي', 'جوان', 'جويلية', 'أوت', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'],
            datasets: [{
                label: 'مبيعات الأشهر',
                data: [0, 0, {{ daily_total }}, 0, 0, 0, 0, 0, 0, 0, 0, 0], 
                borderColor: '#28a745',
                fill: false
            }]
        }
    });
</script>
