<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإحصائيات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .total-box { background: #007bff; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        canvas { max-width: 100%; margin-top: 20px; }
        .back-link { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="total-box">
            <h2>إجمالي المبيعات: {{ total }} دج</h2>
        </div>

        <h3>رسم بياني للطلبيات</h3>
        <canvas id="myChart"></canvas>
        
        <br>
        <a href="/dashboard" class="back-link">العودة للوحة التحكم</a>
    </div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'bar', // نوع الرسم البياني (يمكنك تغييره لـ 'line')
            data: {
                // توليد أسماء الطلبيات ديناميكياً
                labels: [{% for order in orders %}"طلب {{ loop.index }}",{% endfor %}],
                datasets: [{
                    label: 'قيمة الطلبية (دج)',
                    // جلب الأسعار ديناميكياً من main.py
                    data: {{ prices | tojson }}, 
                    backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>
</body>
</html>
