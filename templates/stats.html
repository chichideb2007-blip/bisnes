<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإحصائيات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .chart-box { margin-bottom: 40px; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>التقارير والإحصائيات</h2>

    <div class="chart-box">
        <h3>المبيعات حسب الأيام</h3>
        <canvas id="dailyChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>المبيعات حسب الأشهر</h3>
        <canvas id="monthlyChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>المبيعات حسب السنوات</h3>
        <canvas id="yearlyChart"></canvas>
    </div>

    <a href="/dashboard" style="display: block; text-align: center; margin-top: 20px;">العودة للوحة التحكم</a>
</div>

<script>
    // دالة إنشاء الرسوم البيانية
    function createChart(canvasId, labelName, chartData) {
        new Chart(document.getElementById(canvasId), {
            type: 'line',
            data: {
                labels: Object.keys(chartData), 
                datasets: [{
                    label: labelName,
                    data: Object.values(chartData),
                    borderColor: '#007bff',
                    backgroundColor: 'rgba(0, 123, 255, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true }
        });
    }

    // الربط مع البيانات القادمة من main.py
    createChart('dailyChart', 'مبيعات الأيام', {{ daily | tojson }});
    createChart('monthlyChart', 'مبيعات الأشهر', {{ monthly | tojson }});
    createChart('yearlyChart', 'مبيعات السنوات', {{ yearly | tojson }});
</script>

</body>
</html>
