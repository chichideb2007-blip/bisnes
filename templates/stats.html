<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إحصائيات المتجر</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: {{ settings.primary_color|default('#7e22ce') }}; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .chart-container { background: white; padding: 20px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>مجموع المصروف اليومي</h3>
        <h1 id="dailyTotal" style="color: var(--primary-color);">جاري التحميل...</h1>
    </div>

    <div class="chart-container"><canvas id="dailyChart"></canvas></div>
    <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
    <div class="chart-container"><canvas id="yearlyChart"></canvas></div>
</div>

<script>
    // جلب البيانات من main.py
    fetch('/api/stats')
    .then(res => res.json())
    .then(data => {
        // 1. حساب المجموع اليومي
        const today = new Date().toISOString().split('T')[0];
        const dailySum = data.filter(o => o.created_at.startsWith(today))
                             .reduce((sum, o) => sum + (o.total_price || 0), 0);
        document.getElementById('dailyTotal').innerText = dailySum + ' دج';

        // 2. إعداد الرسوم البيانية (Chart.js)
        // ملاحظة: هنا ستقومين ببرمجة توزيع الـ data على المصفوفات الثلاثة
        // هذا مجرد هيكل للرسم، يمكنك تطويره لاحقاً
        const ctx = document.getElementById('dailyChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'],
                datasets: [{ label: 'المصروف اليومي', data: [/* ضعي البيانات هنا */], borderColor: '{{ settings.primary_color }}' }]
            }
        });
    });
</script>

</body>
</html>
