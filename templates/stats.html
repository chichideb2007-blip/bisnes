<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإحصائيات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; margin: 10px; border-radius: 10px; }
        .btn { padding: 10px; border-radius: 5px; text-decoration: none; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h2>مجموع المصروف اليومي: {{ daily_total }} دج</h2>
    </div>

    <div style="width: 80%; margin: auto;">
        <canvas id="myChart"></canvas>
    </div>

    <hr>
    <a href="{{ url_for('dashboard') }}" class="btn" style="background: green;">الرجوع للوحة التحكم</a>
    <a href="{{ url_for('login') }}" class="btn" style="background: red;">تسجيل الخروج</a>

    <script>
        // إعداد المنحنى البياني
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['الأيام', 'الأشهر', 'السنوات (2026)'],
                datasets: [{
                    label: 'المبيعات',
                    data: [{{ daily_total }}, 0, 0], // هنا يتم ربط البيانات
                    borderColor: 'blue',
                    fill: false
                }]
            }
        });
    </script>
</body>
</html>
