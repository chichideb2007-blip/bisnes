<!DO<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإحصائيات المتقدمة</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .chart-container { margin-bottom: 40px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>لوحة الإحصائيات</h2>

    <div class="chart-container">
        <h3>المبيعات حسب الأيام</h3>
        <canvas id="dailyChart"></canvas>
    </div>

    <div class="chart-container">
        <h3>المبيعات حسب الأشهر</h3>
        <canvas id="monthlyChart"></canvas>
    </div>

    <div class="chart-container">
        <h3>المبيعات حسب السنوات</h3>
        <canvas id="yearlyChart"></canvas>
    </div>

    <a href="/dashboard">العودة للوحة التحكم</a>
</div>

<script>
    // دالة لإنشاء المنحنيات
    function createChart(ctx, label, dataDict, type = 'line') {
        const labels = Object.keys(dataDict);
        const dataValues = Object.values(dataDict);
        
        new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: label,
                    data: dataValues,
                    borderColor: '#007bff',
                    backgroundColor: 'rgba(0, 123, 255, 0.2)',
                    fill: true
                }]
            }
        });
    }

    // تمرير البيانات من Flask إلى JS
    createChart(document.getElementById('dailyChart').getContext('2d'), 'مبيعات يومية', {{ daily | tojson }});
    createChart(document.getElementById('monthlyChart').getContext('2d'), 'مبيعات شهرية', {{ monthly | tojson }});
    createChart(document.getElementById('yearlyChart').getContext('2d'), 'مبيعات سنوية', {{ yearly | tojson }});
</script>

</body>
</html>
