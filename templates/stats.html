<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإحصائيات</title>
    <!-- استخدم Bootstrap لتنسيق الصفحة -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">إحصائيات المتجر</h2>
        
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card bg-primary text-white p-3 text-center">
                    <h5>إجمالي المبيعات</h5>
                    <h3>{{ total_sales }} {{ currency }}</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white p-3 text-center">
                    <h5>إجمالي المصاريف</h5>
                    <h3>{{ total_expenses }} {{ currency }}</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-white p-3 text-center">
                    <h5>عدد الطلبات</h5>
                    <h3>{{ total_orders }}</h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
