<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إحصائيات المتجر</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .card { display: inline-block; width: 200px; padding: 20px; margin: 10px; border-radius: 10px; color: white; }
        .orders-card { background-color: #28a745; }
        .money-card { background-color: #007bff; }
    </style>
</head>
<body>

    <h1>📊 إحصائيات المتجر</h1>

    <div class="card orders-card">
        <h3>عدد الطلبيات</h3>
        <p style="font-size: 24px;">{{ total_orders }}</p>
    </div>

    <div class="card money-card">
        <h3>مجموع الأرباح</h3>
        <p style="font-size: 24px;">{{ total_revenue }} دج</p>
    </div>

    <br><br>
    <a href="{{ url_for('dashboard') }}">الرجوع للوحة التحكم</a>

</body>
</html>
