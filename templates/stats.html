<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إحصائيات المصروفات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: {{ settings.get('theme_color', '#4CAF50') }}; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: auto; text-align: center; }
        .btn-back { background-color: var(--primary-color); color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>منحنى المصروفات اليومي</h2>
    
    <canvas id="expenseChart"></canvas>
    
    <a href="/dashboard" class="btn-back">العودة للوحة التحكم</a>
</div>

<script>
    // جلب البيانات من Flask
    const labels = {{ labels | tojson }};
    const values = {{ values | tojson }};

    // شرط أمني: لا نرسم إلا إذا كانت هناك بيانات
    if (labels && labels.length > 0) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        new Chart(ctx, {
            type: 'line', // منحنى بياني
            data: {
                labels: labels,
                datasets: [{
                    label: 'المصروف (دج)',
                    data: values,
                    borderColor: 'var(--primary-color)',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    tension: 0.4, // لجعل المنحنى ناعماً
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    } else {
        // رسالة في حال كانت البيانات فارغة لمنع الخطأ
        document.querySelector('.card').innerHTML += '<p style="color:red; margin-top:20px;">لا توجد بيانات كافية لعرض المنحنى حالياً.</p>';
    }
</script>

</body>
</html>
