<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>لوحة الإحصائيات</title>
    <style>
        .card { transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
        .chart-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="mb-4 text-center">📊 لوحة الإحصائيات والتقارير</h2>
        
        <div class="row g-4 mb-5">
            <div class="col-md-6">
                <div class="card shadow border-0 text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">إجمالي المبيعات</h5>
                        <h2 class="display-5">{{ total_sales }} دج</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow border-0 text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">عدد الطلبات</h5>
                        <h2 class="display-5">{{ total_orders }}</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="chart-box">
                    <h3>المبيعات حسب أيام الأسبوع</h3>
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-box">
                    <h3>المبيعات الشهرية</h3>
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-box">
                    <h3>المبيعات السنوية</h3>
                    <canvas id="yearlyChart"></canvas>
                </div>
            </div>
        </div>

        <div class="mt-4 text-center mb-5">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary px-4">العودة للوحة التحكم</a>
        </div>
    </div>

    <script>
        function createChart(canvasId, labelName, chartData, orderArray = null) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            let labels, values;
            if (orderArray) {
                labels = orderArray;
                values = orderArray.map(label => chartData[label] || 0);
            } else {
                labels = Object.keys(chartData);
                values = Object.values(chartData);
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: labelName,
                        data: values,
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13, 110, 253, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        // البيانات القادمة من الفلاسك
        const dailyData = {{ daily | tojson | safe }};
        const monthlyData = {{ monthly | tojson | safe }};
        const yearlyData = {{ yearly | tojson | safe }};

        const daysOrder = ["السبت", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];
        const monthsOrder = ["جانفي", "فيفري", "مارس", "أفريل", "ماي", "جوان", "جويلية", "أوت", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

        createChart('dailyChart', 'المبيعات اليومية', dailyData, daysOrder);
        createChart('monthlyChart', 'المبيعات الشهرية', monthlyData, monthsOrder);
        createChart('yearlyChart', 'المبيعات السنوية', yearlyData);
    </script>
</body>
</html>
