<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المخزون</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .form-container { background: #f4f4f4; padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>إدارة المخزون</h1>

    <div class="form-container">
        <h3>إضافة منتج جديد</h3>
        <form action="/inventory" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="اسم المنتج" required>
                <input type="number" name="quantity" placeholder="الكمية" required>
                <input type="number" step="0.01" name="price" placeholder="السعر" required>
                <input type="text" name="image_url" placeholder="رابط الصورة">
                <button type="submit">حفظ المعلومات</button>
            </div>
        </form>
    </div>

    <table>
        <tr>
            <th>اسم المنتج</th>
            <th>السعر</th>
            <th>الكمية</th>
            <th>الصورة</th>
            <th>الإجراءات</th>
        </tr>
        </table>

    <br>
    <a href="/dashboard"><button>رجوع للوحة التحكم</button></a>
    <a href="/logout"><button>خروج</button></a>
</body>
</html>
